<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFP KYB Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
  --gold: #b8944d;
  --gold-dark: #8a6e3a;
  --gold-darker: #6d5229;
  --gold-light: #e8d9b8;
  --gold-lighter: #f3eadb;
  --beige: #f7f1e3;
  --beige-light: #fdfaf2;
  --white: #ffffff;
  --ink: #1e1e1e;
  --ink-light: #3a3a3a;
  --muted: #7a7a7a;
  --muted-light: #a8a8a8;
  --border: #e0d6bf;
  --border-light: #ede6d4;
  --cond-border: #d4b66a;
  --cond-bg: #fef9ed;
  --error: #c0503a;
  --error-bg: #fef0ec;
  --success: #3a8a5c;
  --success-bg: #edf7f0;
  --warn-bg: #fef6e0;
  --warn-border: #e0c060;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 8px;
  --radius-sm: 6px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--beige-light);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ==================== LAYOUT ==================== */
.app { display: flex; min-height: 100vh; }

.rail {
  width: 272px;
  background: var(--white);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  z-index: 20;
}

.rail-brand {
  padding: 24px 24px 20px;
  border-bottom: 1px solid var(--border-light);
}

.rail-brand h1 {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--gold-dark);
  font-weight: 400;
  letter-spacing: -0.01em;
}

.rail-brand .subtitle {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}

.rail-nav {
  list-style: none;
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.rail-nav li button {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 9px 24px;
  font-size: 13px;
  font-family: var(--font);
  color: var(--ink-light);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}

.rail-nav li button:hover { background: var(--beige-light); }

.rail-nav li button.active {
  background: var(--beige);
  border-left-color: var(--gold);
  font-weight: 600;
  color: var(--gold-darker);
}

.rail-nav li button .pnum {
  font-size: 10px;
  color: var(--muted-light);
  min-width: 20px;
  font-weight: 600;
}

.rail-nav li button.active .pnum { color: var(--gold-dark); }

.rail-nav li button.locked {
  opacity: 0.4;
  cursor: not-allowed;
  color: var(--muted-light);
}

.rail-nav li button.locked:hover { background: none; }

.rail-nav li button .page-check {
  margin-left: auto;
  font-size: 14px;
  opacity: 0.6;
}

.rail-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-light);
}

.rail-footer button {
  width: 100%;
  padding: 8px 12px;
  font-size: 12px;
  font-family: var(--font);
  background: var(--beige);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--ink-light);
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  font-weight: 500;
}

.rail-footer button:hover { background: var(--gold-lighter); }

/* ---- Mobile rail ---- */
.mobile-bar {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  z-index: 40;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}

.mobile-bar .hamburger {
  width: 36px; height: 36px;
  background: none; border: none;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
}

.mobile-bar .hamburger:active { background: var(--beige); }

.mobile-bar .mob-title {
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--gold-dark);
}

.rail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 19;
}

@media (max-width: 768px) {
  .mobile-bar { display: flex; }
  .rail {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    box-shadow: var(--shadow-md);
  }
  .rail.open { transform: translateX(0); }
  .rail-overlay.open { display: block; }
  .main-content { padding-top: 72px; }
  .app { display: block; }
}

/* ==================== MAIN CONTENT ==================== */
.main-content {
  flex: 1;
  min-width: 0;
  padding: 40px 56px 48px;
  max-width: 820px;
}

@media (max-width: 768px) {
  .main-content { padding: 20px; max-width: 100%; }
}

.page-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-light);
}

.page-header .kicker {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gold-dark);
  font-weight: 600;
  margin-bottom: 8px;
}

.page-header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.3;
}

.page-header .sub {
  color: var(--muted);
  font-size: 14px;
  margin-top: 8px;
}

/* ==================== SECTIONS & FIELDS ==================== */
.section {
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.section h2 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gold-dark);
  margin-bottom: 16px;
}

.section h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 20px 0 12px;
  color: var(--ink);
}

.section .intro {
  font-size: 13px;
  color: var(--muted);
  margin: -8px 0 16px;
  line-height: 1.5;
}

.field {
  margin-bottom: 16px;
}

.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 5px;
  color: var(--ink);
}

.field label .req { color: var(--error); margin-left: 2px; }
.field label .opt { font-weight: 400; color: var(--muted); font-size: 12px; }

.field input[type="text"],
.field input[type="email"],
.field input[type="tel"],
.field input[type="number"],
.field input[type="date"],
.field select,
.field textarea {
  width: 100%;
  padding: 10px 12px;
  font-size: 15px;
  font-family: var(--font);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--white);
  color: var(--ink);
  min-height: 44px;
  transition: border-color 0.15s;
}

.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,148,77,0.12);
}

.field textarea { min-height: 80px; resize: vertical; }
.field .help { font-size: 12px; color: var(--muted); margin-top: 4px; }

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.field-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

@media (max-width: 600px) {
  .field-row, .field-row-3 { grid-template-columns: 1fr; }
}

/* Radio / check groups */
.radio-group, .check-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.radio-group label, .check-group label {
  font-weight: 400;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}

.radio-group label:hover, .check-group label:hover {
  border-color: var(--gold-light);
  background: var(--beige-light);
}

.radio-group label.selected, .check-group label.selected {
  border-color: var(--gold);
  background: var(--gold-lighter);
}

.radio-group input, .check-group input { margin-top: 2px; flex-shrink: 0; }

/* Upload box */
.upload-box {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  background: var(--beige-light);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.upload-box:hover {
  border-color: var(--gold-light);
  background: var(--gold-lighter);
}

.upload-box .upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-box .upload-label { font-weight: 600; font-size: 14px; }
.upload-box .upload-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
.upload-box input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

/* Upload preview */
.upload-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--success-bg);
  border: 1px solid var(--success);
  border-radius: var(--radius-sm);
  margin-top: 8px;
}

.upload-preview img {
  width: 48px;
  height: 48px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.upload-preview .file-name { font-size: 13px; font-weight: 500; flex: 1; }
.upload-preview .file-size { font-size: 11px; color: var(--muted); }
.upload-preview .remove-btn {
  background: none;
  border: none;
  color: var(--error);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
}

/* Conditional block */
.cond-block {
  border: 1px dashed var(--cond-border);
  background: var(--cond-bg);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 16px;
}

.cond-block.hidden-cond { display: none; }

.cond-tag {
  display: inline-block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gold-dark);
  background: var(--white);
  border: 1px solid var(--cond-border);
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-weight: 600;
}

/* Note / warning boxes */
.note-box {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
  line-height: 1.5;
}

.note-box.info {
  background: var(--beige);
  border-left: 3px solid var(--gold);
}

.note-box.warn {
  background: var(--warn-bg);
  border-left: 3px solid var(--warn-border);
}

.note-box.error {
  background: var(--error-bg);
  border-left: 3px solid var(--error);
}

.note-box.success {
  background: var(--success-bg);
  border-left: 3px solid var(--success);
}

.note-box strong { color: var(--gold-dark); }

/* OCR badge */
.ocr-badge {
  display: inline-block;
  font-size: 9px;
  background: var(--gold-light);
  color: var(--gold-dark);
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  vertical-align: middle;
  margin-left: 6px;
}

/* OCR shimmer animation */
.ocr-loading .field input,
.ocr-loading .field select,
.ocr-loading .field textarea {
  background: linear-gradient(90deg, var(--beige-light) 25%, var(--gold-lighter) 50%, var(--beige-light) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  color: transparent;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.extracting-overlay {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--gold-lighter);
  border: 1px solid var(--gold-light);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--gold-darker);
  font-weight: 500;
}

.extracting-overlay .spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--gold-light);
  border-top-color: var(--gold-dark);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Checklist */
.doc-checklist { list-style: none; }
.doc-checklist li {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 14px;
}

.doc-checklist li:last-child { border-bottom: none; }
.doc-checklist .ck { color: var(--gold); font-weight: 700; min-width: 18px; font-size: 16px; }
.doc-checklist .dn { font-weight: 600; }
.doc-checklist .dm { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Shareholder switcher / signatory switcher */
.variant-switcher {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--beige);
  border-radius: var(--radius-sm);
  align-items: center;
}

.variant-switcher .vs-label {
  font-size: 12px;
  color: var(--muted);
  margin-right: 6px;
  font-weight: 500;
}

.variant-switcher button {
  padding: 6px 14px;
  font-size: 12px;
  font-family: var(--font);
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}

.variant-switcher button:hover { border-color: var(--gold-light); }

.variant-switcher button.active {
  background: var(--gold);
  color: var(--white);
  border-color: var(--gold-dark);
}

/* Linked card */
.linked-card {
  background: var(--beige);
  border-left: 3px solid var(--gold);
  padding: 14px 16px;
  border-radius: var(--radius-sm);
}

.linked-card .lc-tag {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--gold-dark);
  font-weight: 600;
  margin-bottom: 4px;
}

.linked-card .lc-name { font-weight: 600; font-size: 15px; }
.linked-card .lc-info { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Summary rows */
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  gap: 16px;
}

.summary-row:last-child { border-bottom: none; }
.summary-row .s-label { font-size: 12px; color: var(--muted); flex: 1; }
.summary-row .s-value { font-size: 14px; flex: 2; word-break: break-word; }
.summary-row .s-edit {
  font-size: 12px;
  color: var(--gold-dark);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
  font-family: var(--font);
  white-space: nowrap;
}

/* ==================== NAV BUTTONS ==================== */
.nav-bar {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid var(--border-light);
}

.btn {
  padding: 12px 32px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  border-radius: var(--radius-sm);
  cursor: pointer;
  min-height: 44px;
  min-width: 120px;
  transition: all 0.15s;
  border: none;
}

.btn-back {
  background: var(--white);
  border: 1px solid var(--border);
  color: var(--ink-light);
}

.btn-back:hover { background: var(--beige); }
.btn-back:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-next {
  background: var(--gold);
  color: var(--white);
}

.btn-next:hover { background: var(--gold-dark); }

.btn-submit {
  background: var(--success);
  color: var(--white);
}

.btn-submit:hover { background: #2e7a4e; }

/* ==================== SETTINGS MODAL ==================== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
}

.modal h2 {
  font-family: var(--font-display);
  font-size: 22px;
  margin-bottom: 8px;
}

.modal .modal-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

.modal .field { margin-bottom: 16px; }

.modal .modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
}

.modal .modal-actions button {
  padding: 10px 20px;
  font-size: 14px;
  font-family: var(--font);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 600;
  border: none;
}

.modal .btn-cancel { background: var(--beige); color: var(--ink); }
.modal .btn-save { background: var(--gold); color: var(--white); }

/* ==================== CONFIRMATION ==================== */
.confirm-box {
  text-align: center;
  padding: 48px 24px;
}

.confirm-box .check-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--success-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 32px;
  color: var(--success);
}

.confirm-box .ref-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--gold-dark);
  background: var(--beige);
  padding: 12px 28px;
  border-radius: var(--radius-sm);
  display: inline-block;
  letter-spacing: 0.04em;
  font-family: var(--font);
}

/* Progress bar */
.progress-bar {
  height: 3px;
  background: var(--border-light);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-bar .fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.3s ease;
  border-radius: 2px;
}

/* ============================================================
   OCR REVIEW PATTERN (Pattern B)
   ============================================================ */

/* Wraps any extracted field. The wrapper is what shows the badge + state. */
.field.review-extracted input,
.field.review-extracted select,
.field.review-extracted textarea {
  background: #fff8e1;          /* soft amber */
  border-color: #f0c74e;
}

.field.review-confirmed input,
.field.review-confirmed select,
.field.review-confirmed textarea {
  background: #effaf3;          /* soft green */
  border-color: #b6dabf;
}

.review-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-left: 8px;
  cursor: pointer;
  user-select: none;
  vertical-align: middle;
  transition: all 0.15s ease;
}

.review-badge.extracted {
  background: #fff3cd;
  color: #8a6d1c;
  border: 1px solid #f0c74e;
}
.review-badge.extracted:hover {
  background: #ffe9a0;
}
.review-badge.confirmed {
  background: #e1f3e7;
  color: #2c6b3e;
  border: 1px solid #b6dabf;
}

/* Inline confirm/edit hint shown when a field is in 'extracted' state */
.review-hint {
  font-size: 12px;
  color: #8a6d1c;
  margin-top: 4px;
  padding: 6px 10px;
  background: #fff8e1;
  border-left: 3px solid #f0c74e;
  border-radius: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.review-hint button {
  appearance: none;
  border: 1px solid #f0c74e;
  background: white;
  color: #6b5614;
  padding: 3px 10px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.review-hint button:hover { background: #fff8e1; }

/* Subtle visual cue for required fields that are still empty.
   Applied to .field wrappers with the .field-required-empty class.
   Goal: visible reminder, not an error — customer sees the work remaining
   without us yelling at them. */
.field.field-required-empty input,
.field.field-required-empty select,
.field.field-required-empty textarea {
  background: linear-gradient(to right, #fffaef 0%, #fff 60%);
  border-color: #e8d8a8;
}
.field.field-required-empty input:focus,
.field.field-required-empty select:focus,
.field.field-required-empty textarea:focus {
  background: #fff;
  border-color: var(--gold);
}

/* Section-level extraction-review banner.
   Shown once per section when fields have been extracted but not yet confirmed.
   One-click confirms all fields in the section. */
.section-review-banner {
  margin: 0 0 16px;
  padding: 12px 16px;
  background: #fff8e1;
  border: 1px solid #f0c74e;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  font-size: 14px;
  color: #6b5614;
}
.section-review-banner.confirmed {
  background: #effaf3;
  border-color: #b6dabf;
  color: #2c6b3e;
}
.section-review-banner .label {
  flex: 1;
}
.section-review-banner button {
  appearance: none;
  border: 1px solid #f0c74e;
  background: white;
  color: #6b5614;
  padding: 6px 16px;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
}
.section-review-banner button:hover { background: #fff8e1; }

/* OCR status banner shown above an upload-related section */
.ocr-status {
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ocr-status.extracting {
  background: #eef4fb;
  color: #244b6e;
  border-left: 3px solid #5a8bc7;
}
.ocr-status.success {
  background: #effaf3;
  color: #2c6b3e;
  border-left: 3px solid #6bbf85;
}
.ocr-status.error {
  background: #fbe9e9;
  color: #8a2424;
  border-left: 3px solid #c75a5a;
}

.ocr-spinner {
  width: 16px; height: 16px;
  border: 2px solid #cdd5e1;
  border-top-color: #5a8bc7;
  border-radius: 50%;
  animation: ocr-spin 0.6s linear infinite;
  flex-shrink: 0;
}
@keyframes ocr-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Banner at top of pages with unreviewed fields */
.review-banner {
  margin: 16px 0;
  padding: 14px 18px;
  background: #fff8e1;
  border: 1px solid #f0c74e;
  border-radius: 6px;
  font-size: 14px;
  color: #6b5614;
}
.review-banner strong { color: #4a3c0e; }

/* Multi-select 'other' free-text field — appears below the checkboxes */
.other-text-input {
  margin-top: 10px;
  padding: 10px;
  background: #f7f9fa;
  border-left: 3px solid var(--gold);
  border-radius: 2px;
}
.other-text-input label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.other-text-input input {
  font-size: 14px;
}

/* ==================== MOBILE POLISH ====================
   Comprehensive mobile responsive overrides. Cutoff is 768px — phones
   in portrait (~360-430px) and tablets in portrait (~768px) both get
   the stacked layout. Above 768px, the existing desktop layout applies.

   Goal: production-grade applicant experience on phones. Most UAE
   SME applicants will use this on mobile.
   ======================================================== */
@media (max-width: 768px) {
  /* Mobile top bar — show always, with a step indicator. */
  .mobile-bar {
    display: flex;
    padding: 0 12px;
    gap: 10px;
  }
  .mobile-bar .mob-title { display: none; }   /* Replace with step indicator */
  .mobile-bar .mob-step {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
    flex: 1;
    min-width: 0;
  }
  .mobile-bar .mob-step .step-label {
    font-size: 11px;
    color: var(--gold-dark);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .mobile-bar .mob-step .step-title {
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mobile-bar .mob-progress {
    height: 3px;
    background: var(--border-light);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .mobile-bar .mob-progress .bar {
    height: 100%;
    background: var(--gold);
    transition: width 0.25s ease;
  }

  /* Hide mob-step / progress on desktop */
  .mobile-bar .mob-step,
  .mobile-bar .mob-progress { display: flex; }

  /* Main content — tighten padding on phones. */
  .main-content {
    padding: 16px 14px 32px;
    padding-top: 76px;     /* below the 56px mobile-bar with breathing room */
  }

  /* Page header — smaller hero on mobile. */
  .page-header { margin-bottom: 18px; padding-bottom: 14px; }
  .page-header h1 { font-size: 22px; line-height: 1.25; }
  .page-header .kicker { font-size: 10px; }
  .page-header p.intro { font-size: 14px; line-height: 1.45; }

  /* Sections — tighter padding, less rounded so they feel native. */
  .section {
    padding: 14px 14px;
    margin-bottom: 14px;
    border-radius: 6px;
  }
  .section h2 {
    font-size: 14px;
    margin-bottom: 12px;
  }

  /* Field rows — stack everything (override the 600px breakpoint with 768px). */
  .field-row, .field-row-3 { grid-template-columns: 1fr; gap: 12px; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 13px; }

  /* Inputs — slightly larger touch target. iOS Safari zooms in if font-size
     under 16px on input focus, so we force 16px to prevent that annoying zoom. */
  .field input[type="text"],
  .field input[type="email"],
  .field input[type="tel"],
  .field input[type="number"],
  .field input[type="date"],
  .field select,
  .field textarea {
    font-size: 16px;
    padding: 11px 12px;
    min-height: 44px;
  }

  /* Radio / check groups — full width tiles. */
  .radio-group label, .check-group label {
    padding: 12px 14px;
    font-size: 14px;
  }

  /* Buttons — full width on mobile. */
  .btn {
    width: 100%;
    padding: 14px 20px;
    font-size: 15px;
  }
  .btn + .btn { margin-top: 10px; }   /* When stacked */

  /* Page footer (Back / Next) — stack into column with primary on top. */
  .page-footer {
    flex-direction: column-reverse;
    gap: 0;
    padding: 16px 0 0;
  }
  .page-footer .btn-back { width: 100%; }
  .page-footer .btn-next,
  .page-footer .btn-submit { width: 100%; }

  /* File upload — bigger touch target, clearer label. */
  .upload-box {
    padding: 18px 14px;
    border-radius: 6px;
  }
  .upload-box .upload-icon { font-size: 28px; }
  .upload-box .upload-label { font-size: 14px; }
  .upload-box .upload-hint { font-size: 11px; }

  /* File preview — wrap nicely; thumbnail fixed size. */
  .upload-preview {
    flex-wrap: wrap;
    padding: 10px 12px;
    gap: 10px;
  }
  .upload-preview img { width: 48px; height: 48px; }
  .upload-preview .file-name { font-size: 13px; }

  /* OTP input — 4-digit code centered, large, easy to focus. */
  .otp-input-wrap {
    max-width: 100% !important;
  }

  /* Resume banner / warning callouts — full width, less padding. */
  .note-box, .section-review-banner {
    padding: 12px 14px;
    border-radius: 6px;
  }
  .section-review-banner {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .section-review-banner button { width: 100%; }

  /* Modal — full-screen on mobile so users don't fight a tiny popup. */
  .modal-overlay { padding: 0; }
  .modal-card {
    width: 100%;
    height: 100%;
    max-height: 100vh;
    border-radius: 0;
    margin: 0;
  }

  /* Specifically narrow phones — sub-380px (older iPhone SE, small Androids). */
  @media (max-width: 380px) {
    .main-content { padding-left: 10px; padding-right: 10px; }
    .section { padding: 12px 12px; }
    .page-header h1 { font-size: 20px; }
    .btn { font-size: 14px; padding: 12px 16px; }
  }
}

/* ==================== END MOBILE POLISH ==================== */

<script>
/* ==========================================================================
   DEMO MODE SHIM — defensive build
   --------------------------------------------------------------------------
   Intercepts every fetch('/api/*') call and returns synthetic responses so
   the form can be walked end-to-end without a backend.

   This build is defensive: it catches every error, makes UAE-mobile
   validation accept anything, overrides crypto.randomUUID for older
   browsers, and shows a debug panel at the bottom of the page so any
   issue is visible on a phone without opening dev tools.

   To bypass OTP entirely, tap "Skip OTP (demo)" on Page 1.
   ========================================================================== */
const DEMO_MODE = true;

/* Older mobile Safari (pre iOS 15.4) lacks crypto.randomUUID. Polyfill it. */
if (!window.crypto) window.crypto = {};
if (typeof crypto.randomUUID !== 'function') {
  crypto.randomUUID = function() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = (Math.random() * 16) | 0, v = c === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  };
}
if (typeof crypto.getRandomValues !== 'function') {
  crypto.getRandomValues = function(arr) {
    for (let i = 0; i < arr.length; i++) arr[i] = (Math.random() * 256) | 0;
    return arr;
  };
}

/* Debug panel — visible on the page itself so phone testers can see errors
   without opening dev tools. Toggle via the "🐞" button bottom-right. */
window.addEventListener('error', e => _demoLog('ERROR: ' + (e.message || e.error)));
window.addEventListener('unhandledrejection', e => _demoLog('PROMISE: ' + (e.reason && e.reason.message || e.reason)));

const _demoLogs = [];
function _demoLog(msg) {
  const t = new Date().toLocaleTimeString();
  _demoLogs.push(`[${t}] ${msg}`);
  if (_demoLogs.length > 50) _demoLogs.shift();
  const panel = document.getElementById('demoLogPanel');
  if (panel) panel.textContent = _demoLogs.join('\n');
}

/* Patch fetch */
const _origFetch = window.fetch.bind(window);
window.fetch = async function(url, opts) {
  if (typeof url === 'string' && url.startsWith('/api/')) {
    try {
      return await demoFetch(url, opts);
    } catch (e) {
      _demoLog('SHIM ERROR ' + url + ': ' + e.message);
      return jsonResp({ detail: 'Demo shim failed: ' + e.message }, 500);
    }
  }
  return _origFetch(url, opts);
};

async function demoFetch(url, opts) {
  const body = opts && opts.body ? safeParse(opts.body) : null;
  _demoLog(url + (body && body.code_sms ? ` (code=${body.code_sms})` : ''));
  await new Promise(r => setTimeout(r, 50));   // tiny delay

  if (url === '/api/config')
    return jsonResp({ extraction_configured: true, email_configured: false,
                       sms_configured: false, max_upload_mb: 10,
                       otp_length: 4, otp_expiry_minutes: 3 });

  if (url === '/api/lovs') {
    try {
      const r = await _origFetch('lovs.json', { cache: 'no-store' });
      if (!r.ok) throw new Error('lovs.json returned ' + r.status);
      const j = await r.json();
      return jsonResp(j);
    } catch (e) {
      _demoLog('lovs.json fetch failed: ' + e.message + '. Using minimal fallback.');
      // Minimal fallback so dropdowns aren't completely empty
      return jsonResp(_FALLBACK_LOVS);
    }
  }

  if (url === '/api/session/start') return jsonResp({ ok: true });
  if (url === '/api/session/page')  return jsonResp({ ok: true });
  if (url === '/api/session/reset') return jsonResp({ session_id: _demoUuid() });
  if (url === '/api/draft-save')    return jsonResp({ saved: true, saved_at: new Date().toISOString() });
  if (url === '/api/draft-load')    return jsonResp({ state: 'no_draft' });

  if (url === '/api/otp/send')
    return jsonResp({ success: true, message: 'Verification code sent (DEMO — any 4 digits work).' });

  if (url === '/api/otp/verify') {
    const code = (body && body.code_sms || '').trim();
    if (!code || code.length !== 4) {
      return jsonResp({ detail: 'Please enter any 4-digit code.' }, 400);
    }
    return jsonResp({
      success: true,
      ref_number: 'KYB-DEMO-' + Date.now().toString().slice(-6),
      session_id: (body && body.session_id) || _demoUuid(),
    });
  }

  if (url === '/api/upload') {
    return jsonResp({
      file_id: 'demo-' + Math.random().toString(36).slice(2,10),
      doc_id:  Math.floor(Math.random() * 9999),
    });
  }

  if (url === '/api/extract' || url === '/api/llm-extract') {
    const docType = (body && (body.doc_type || body.docType)) || 'unknown';
    return jsonResp(_demoExtractionFor(docType));
  }

  if (url === '/api/match-legal-type') return jsonResp({ code: 'llc', confidence: 0.95 });

  if (url === '/api/submit') {
    return jsonResp({ ref: 'KYB-DEMO-' + Date.now().toString().slice(-6), success: true });
  }

  _demoLog('UNHANDLED: ' + url);
  return jsonResp({ detail: 'Not implemented in demo' }, 404);
}

function jsonResp(obj, status) {
  return new Response(JSON.stringify(obj),
    { status: status || 200, headers: { 'Content-Type': 'application/json' } });
}
function safeParse(s) {
  if (typeof s !== 'string') return null;
  try { return JSON.parse(s); } catch (_) { return null; }
}
function _demoUuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'demo-' + Math.random().toString(36).slice(2);
}

/* Minimal LOV fallback if lovs.json fails to load (e.g. hosted on
   file:// where CORS blocks the fetch). Dropdowns won't be complete
   but the form won't be completely empty. */
const _FALLBACK_LOVS = {
  gender:     { options: [{code:'male',label:'Male'},{code:'female',label:'Female'}], multi: false },
  salutation: { options: [{code:'mr',label:'Mr.'},{code:'ms',label:'Ms.'},{code:'mrs',label:'Mrs.'}], multi: false },
  marital_status: { options: [{code:'single',label:'Single'},{code:'married',label:'Married'}], multi: false },
  preferred_language: { options: [{code:'english',label:'English'},{code:'arabic',label:'Arabic'}], multi: false },
  id_type: { options: [{code:'emirates_id',label:'Emirates ID'},{code:'passport',label:'Passport'}], multi: false },
  emirate: { options: [
    {code:'dubai',label:'Dubai'},{code:'abu_dhabi',label:'Abu Dhabi'},
    {code:'sharjah',label:'Sharjah'},{code:'ajman',label:'Ajman'},
    {code:'umm_al_quwain',label:'Umm Al Quwain'},{code:'rak',label:'Ras Al Khaimah'},
    {code:'fujairah',label:'Fujairah'},
  ], multi: false },
  country: { options: [
    {code:'AE',label:'United Arab Emirates'},{code:'IN',label:'India'},
    {code:'PK',label:'Pakistan'},{code:'GB',label:'United Kingdom'},
    {code:'US',label:'United States'},{code:'EG',label:'Egypt'},
    {code:'JO',label:'Jordan'},{code:'LB',label:'Lebanon'},
    {code:'SA',label:'Saudi Arabia'},{code:'PH',label:'Philippines'},
  ], multi: false },
  currency: { options: [{code:'AED',label:'AED'},{code:'USD',label:'USD'},{code:'EUR',label:'EUR'}], multi: false },
  address_type_retail:    { options: [{code:'residential',label:'Residential'},{code:'work',label:'Work'}], multi: false },
  address_type_corporate: { options: [{code:'office',label:'Office'},{code:'warehouse',label:'Warehouse'}], multi: false },
  residence_type:  { options: [{code:'owned',label:'Owned'},{code:'rented',label:'Rented'}], multi: false },
  occupation:      { options: [{code:'business_owner',label:'Business Owner'},{code:'salaried',label:'Salaried'},{code:'self_employed',label:'Self-employed'}], multi: false },
  activity_status: { options: [{code:'self_employed',label:'Self-employed'},{code:'employed',label:'Employed'}], multi: false },
  economic_sector: { options: [
    {code:'trading',label:'Trading'},{code:'services',label:'Services'},
    {code:'manufacturing',label:'Manufacturing'},{code:'construction',label:'Construction'},
  ], multi: false },
  source_of_income: { options: [{code:'business',label:'Business income'},{code:'salary',label:'Salary'},{code:'investments',label:'Investments'}], multi: true },
  source_of_wealth: { options: [{code:'business_profits',label:'Business profits'},{code:'savings',label:'Savings'},{code:'inheritance',label:'Inheritance'}], multi: true },
  source_of_funds:  { options: [{code:'business_revenue',label:'Business revenue'},{code:'capital',label:'Capital contribution'}], multi: true },
  purpose_of_account: { options: [{code:'operations',label:'Business operations'},{code:'payroll',label:'Payroll'}], multi: true },
  estimated_monthly_turnover: { options: [
    {code:'lt_50k',label:'Less than 50,000'},{code:'50k_250k',label:'50,000 – 250,000'},
    {code:'250k_1m',label:'250,000 – 1,000,000'},{code:'gt_1m',label:'More than 1,000,000'},
  ], multi: false },
  annual_expected_turnover: { options: [
    {code:'lt_500k',label:'Less than 500,000'},{code:'500k_5m',label:'500,000 – 5,000,000'},
    {code:'gt_5m',label:'More than 5,000,000'},
  ], multi: false },
  number_of_employees: { options: [{code:'0',label:'0'},{code:'1_10',label:'1–10'},{code:'11_50',label:'11–50'},{code:'gt_50',label:'More than 50'}], multi: false },
  is_pep: { options: [{code:'no',label:'No'},{code:'yes',label:'Yes'}], multi: false },
  issuing_authority: { options: [{code:'ded_dubai',label:'DED Dubai'},{code:'adcc',label:'Abu Dhabi'},{code:'sez',label:'Free Zone'}], multi: false },
  legal_type: { options: [
    {code:'sole_proprietorship',label:'Sole Proprietorship'},
    {code:'llc',label:'Limited Liability Company (LLC)'},
    {code:'fze',label:'Free Zone Establishment (FZE)'},
    {code:'opc',label:'One Person Company (OPC)'},
    {code:'other',label:'Other'},
  ], multi: false },
};

function _demoExtractionFor(docType) {
  switch (docType) {
    case 'tradeLicense':
      return { extraction_id: 'demo-tl', success: true, fields: {
        companyNameEn: 'Demo Trading LLC', licenseNumber: 'CN-1234567',

}

/* Show a small debug panel at the bottom of the screen (collapsed by default).
   Tap "🐞" to expand. Logs every API call and any error. */
window.addEventListener('DOMContentLoaded', () => {
  const btn = document.createElement('button');
  btn.textContent = '🐞';
  btn.style.cssText = 'position:fixed;bottom:12px;right:12px;width:44px;height:44px;border-radius:50%;border:0;background:#2d3748;color:#fff;font-size:20px;z-index:1000;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2)';
  const panel = document.createElement('pre');
  panel.id = 'demoLogPanel';
  panel.style.cssText = 'display:none;position:fixed;bottom:64px;right:12px;left:12px;max-height:40vh;background:rgba(26,32,44,0.95);color:#a0e060;padding:12px;border-radius:8px;font-size:10px;line-height:1.4;overflow:auto;z-index:1000;margin:0;white-space:pre-wrap;word-wrap:break-word';
  btn.onclick = () => { panel.style.display = panel.style.display === 'none' ? 'block' : 'none'; };
  document.body.appendChild(panel);
  document.body.appendChild(btn);
  _demoLog('Demo started. Tap 🐞 to see API call log.');
});

/* After bootstrap runs, override the UAE-mobile validator so any 9+ digit
   input is accepted. The real validator rejects e.g. Indian numbers,
   which is unhelpful for demo testing. We delay this until the original
   function exists. */
window.addEventListener('load', () => {
  if (typeof isValidUaeMobile === 'function') {
    window.isValidUaeMobile = function(m) {
      const digits = (m || '').replace(/\D/g, '');
      return digits.length >= 5;     // accept anything that looks numeric
    };
    _demoLog('Mobile validator relaxed for demo.');
  }
  if (typeof fullMobileForWire === 'function') {
    const orig = window.fullMobileForWire;
    window.fullMobileForWire = function(m) {
      const out = orig(m);
      if (out) return out;
      // Original returned empty (invalid UAE shape). Fall back to a
      // digits-only version so demo isn't blocked.
      const digits = (m || '').replace(/\D/g, '');
      return digits ? '+971-' + digits : '';
    };
    _demoLog('Mobile wire formatter relaxed for demo.');
  }
});

/* ============================================================
   SESSION TRACKING
   ============================================================
   On first load, we generate a UUID v4 in localStorage. Every page
   transition is reported to the server so we can see funnel drop-off.
   The session row exists from the first page load — applications row
   only gets created on OTP verify (see /api/otp/verify).

   Pages are referenced by stable string IDs, not page numbers, so
   the analytics survive flow reorganisations.
   ============================================================ */
const PAGE_IDS = {
  1: 'business_contact',
  2: 'tl_and_structure',
  3: 'owners_signatories',
  4: 'documents',
  5: 'declarations',
  6: 'confirmation',
};

let SESSION_ID = null;
let _maxPageIdReached = 'business_contact';

function ensureSessionId() {
  if (SESSION_ID) return SESSION_ID;
  try {
    SESSION_ID = localStorage.getItem('kyb_session_id');
  } catch (e) { /* localStorage may be disabled */ }
  if (!SESSION_ID) {
    // UUID v4. crypto.randomUUID exists in all modern browsers.
    SESSION_ID = (crypto.randomUUID && crypto.randomUUID()) || _uuidV4Fallback();
    try { localStorage.setItem('kyb_session_id', SESSION_ID); } catch (e) {}
  }
  return SESSION_ID;
}

function _uuidV4Fallback() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = (Math.random() * 16) | 0;
    return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
  });
}

async function sessionStart() {
  ensureSessionId();
  try {
    await fetch('/api/session/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: SESSION_ID,
        page_id: PAGE_IDS[1],
        user_agent: navigator.userAgent,
        referrer: document.referrer || '',
      }),
    });
  } catch (e) {
    // Non-fatal: analytics shouldn't block the form. Log and continue.
    console.warn('[session/start] failed', e);
  }
}

async function sessionPage(fromPage, toPage) {
  if (!SESSION_ID) return;
  const fromId = PAGE_IDS[fromPage] || String(fromPage);
  const toId   = PAGE_IDS[toPage]   || String(toPage);
  // Decide whether toPage is further than anywhere we've been before.
  const order = Object.keys(PAGE_IDS).map(Number).sort((a, b) => a - b);
  const maxIdx = order.indexOf(Number(Object.entries(PAGE_IDS).find(([k, v]) => v === _maxPageIdReached)?.[0]));
  const toIdx  = order.indexOf(toPage);
  const isFurther = toIdx > maxIdx;
  if (isFurther) _maxPageIdReached = toId;
  try {
    await fetch('/api/session/page', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: SESSION_ID,
        from_page: fromId,
        to_page: toId,
        is_further: isFurther,
      }),
    });
  } catch (e) {
    console.warn('[session/page] failed', e);
  }
}

/* ============================================================
   DRAFT SAVE — /api/draft-save
   ============================================================
   Saves a snapshot of the current form state to the server so the
   applicant can resume later. Called automatically on page transitions
   and after the OTP step. Debounced so back-to-back nav clicks coalesce
   into one network call.

   The backend stores the snapshot on applications.draft_state_json.
   Currently no UI restores it on a returning visit — that's a separate
   TODO. But by saving from day one we're not losing any data.
   ============================================================ */
let _draftSaveTimer = null;
function scheduleDraftSave(currentPageId, delayMs) {
  if (_draftSaveTimer) clearTimeout(_draftSaveTimer);
  _draftSaveTimer = setTimeout(() => {
    _draftSaveTimer = null;
    doDraftSave(currentPageId).catch(e => console.warn('[draft-save] failed', e));
  }, delayMs || 800);
}

async function doDraftSave(currentPageId) {
  if (!SESSION_ID) return;
  // Strip file blobs from the snapshot — they're already in the documents
  // table via /api/upload, and including them would balloon the payload.
  const snapshot = JSON.parse(JSON.stringify(S, (k, v) => {
    if (k === 'data' || k === 'thumb') return undefined;
    if (k.startsWith('_')) return undefined;
    return v;
  }));
  try {
    await fetch('/api/draft-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: SESSION_ID,
        state: snapshot,
        current_page: currentPageId,
      }),
    });
  } catch (e) {
    // Non-fatal. Drafts are best-effort.
    console.warn('[draft-save] network error', e);
  }
}

/* ============================================================
   RESUME ON RETURNING VISIT — /api/draft-load + /api/session/reset
   ============================================================
   On bootstrap we ask the server "does this session_id have a saved
   draft to resume?" If yes, we stash the response in _resumePrompt
   and show a banner on Page 1 with two buttons:
       - Resume → restoreDraft(): merge state, jump to saved page
       - Start Over → resetSession(): mint a new session_id; old draft
                      stays in DB as an abandoned attempt

   If the server says the linked application was already submitted from
   another device, we show a different banner — "already submitted" —
   with only a Start New button.
   ============================================================ */

// Possible shapes once populated:
//   { state: 'draft_available',  ref_number, current_page, draft_state, ... }
//   { state: 'already_submitted', ref_number, submitted_at }
//   null  → no prompt
let _resumePrompt = null;

// Pages that count as "meaningful progress" — banner only shows if the
// applicant reached at least this point. Stops us nagging about a
// half-filled Page 1.
const _RESUME_MIN_PAGE_IDS = ['tl_and_structure', 'owners_signatories',
                              'documents', 'declarations', 'confirmation'];

async function checkForResumableDraft() {
  if (!SESSION_ID) return;
  try {
    const resp = await fetch('/api/draft-load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID }),
    });
    if (!resp.ok) return;
    const data = await resp.json();
    if (!data || data.state === 'no_draft') return;

    if (data.state === 'already_submitted') {
      _resumePrompt = data;
      render(true);
      return;
    }

    if (data.state === 'draft_available') {
      // Only surface the banner if there's meaningful progress.
      const cp = data.current_page || 'business_contact';
      if (!_RESUME_MIN_PAGE_IDS.includes(cp)) {
        console.log('[resume] draft exists but minimal progress; skipping banner.');
        return;
      }
      _resumePrompt = data;
      render(true);
    }
  } catch (e) {
    console.warn('[resume] check failed', e);
  }
}

function restoreDraft() {
  if (!_resumePrompt || _resumePrompt.state !== 'draft_available') return;
  const draft = _resumePrompt.draft_state || {};

  // Merge the saved snapshot back into S. We overwrite scalar/object fields
  // we know about; we DON'T clobber transient _-prefixed flags.
  for (const k of Object.keys(draft)) {
    if (k.startsWith('_')) continue;
    S[k] = draft[k];
  }

  // OTP state: the application row already exists and is verified.
  // Mark _otpVerified = true so the user isn't asked to re-verify.
  S._otpVerified = true;
  S._otpSent = true;          // skip the "send codes" screen on Page 1
  S._refNumber = _resumePrompt.ref_number;

  // Page navigation: jump to the saved page (or just past Page 1 if the
  // current_page is 'business_contact' — that's the resume-from-OTP case).
  const pageIdToNum = {};
  for (const [num, id] of Object.entries(PAGE_IDS)) pageIdToNum[id] = Number(num);
  const target = pageIdToNum[_resumePrompt.current_page] || 2;
  curPage = target;
  if (curPage > maxReachedPage) maxReachedPage = curPage;

  _resumePrompt = null;
  render();
}

async function resetSession() {
  // Mint a new session_id; old application stays as abandoned draft.
  const oldId = SESSION_ID;
  try {
    const resp = await fetch('/api/session/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: oldId }),
    });
    if (resp.ok) {
      const data = await resp.json();
      if (data.session_id) {
        SESSION_ID = data.session_id;
        try { localStorage.setItem('kyb_session_id', SESSION_ID); } catch (e) {}
      }
    }
  } catch (e) {
    console.warn('[session/reset] failed; minting client-side anyway', e);
    SESSION_ID = (crypto.randomUUID && crypto.randomUUID()) || _uuidV4Fallback();
    try { localStorage.setItem('kyb_session_id', SESSION_ID); } catch (e) {}
  }

  // Hard reset S to defaults — easiest is to reload the page.
  // Avoid full reload (loses dev console state). Instead, blank out fields
  // we care about and bounce to Page 1.
  startOverInternal();
  _resumePrompt = null;
  render();
}

function resumeBanner() {

/* ============================================================
   OTP HELPERS
   ============================================================
   SMS-only verification: a single 4-digit code is sent to the
   applicant's mobile. Email is collected on Page 1 but is not
   verified by code (it's used for the post-submission confirmation
   email). While OTP_FIXED_CODE_MODE is on (dev), the code is
   forced to OTP_FIXED_CODE (default 7861) and no real SMS is sent.
   ============================================================ */

async function otpSend() {
  if (S._otpSending) return;

  // Validate mobile shape locally so we give a clean message rather than
  // a server 400.
  const mobileWire = fullMobileForWire(S.mobile);
  if (!mobileWire) {
    S._otpError = 'Please enter a 9-digit UAE mobile number starting with 5 (e.g. 501234567).';
    render(true);
    return;
  }

  S._otpSending = true;
  S._otpError = '';
  render(true);

  try {
    const resp = await fetch('/api/otp/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: S.email.trim(),
        mobile: mobileWire,
        session_id: SESSION_ID,
      }),
    });

    // Server may return non-JSON on internal errors. Read as text first,
    // then try to parse as JSON. Surface a clean message either way.
    const bodyText = await resp.text();
    let data = null;
    try { data = bodyText ? JSON.parse(bodyText) : null; } catch (_) { /* not JSON */ }

    if (!resp.ok) {
      const msg = (data && data.detail)
        ? data.detail
        : `Server error (${resp.status}). Please try again.`;
      console.error('[otp/send] failed:', resp.status, bodyText);
      if (data && data.traceback) console.error('[otp/send] traceback:', data.traceback.join('\n'));
      throw new Error(msg);
    }

    S._otpSent = true;
    S._otpSending = false;
    S._otpResendCooldown = 30;
    _startResendCountdown();
    render(true);
  } catch (e) {
    S._otpSending = false;
    S._otpError = e.message || 'Could not send the verification code. Please try again.';
    render(true);
  }
}

function _startResendCountdown() {
  if (window._otpCountdownTimer) clearInterval(window._otpCountdownTimer);
  window._otpCountdownTimer = setInterval(() => {
    if (S._otpResendCooldown > 0) {
      S._otpResendCooldown--;
      // Update the countdown text in place instead of re-rendering the whole
      // page. Re-rendering tears down and recreates the OTP input fields
      // every second, which kicks the cursor out while the user is typing.
      _updateResendCountdownInPlace();
    } else {
      clearInterval(window._otpCountdownTimer);
      window._otpCountdownTimer = null;
      // Final state change (cooldown reached 0 → "Resend codes" link reappears):
      // a one-time render is fine here because the user isn't actively typing
      // a code in the moment between countdown end and re-render. But if they
      // are, the resend link toggle isn't critical — defer the re-render until
      // they finish.
      const el = document.getElementById('otpResendArea');
      if (el) {
        el.innerHTML = `<a href="#" onclick="event.preventDefault();otpSend()" style="color:#8a6e3a;font-weight:600">Resend codes</a>`;
      }
    }
  }, 1000);
}

function _updateResendCountdownInPlace() {
  const el = document.getElementById('otpResendArea');
  if (!el) return;
  el.innerHTML = `<span style="color:#aaa">Resend in ${S._otpResendCooldown}s</span>`;
}

async function otpVerifyAndContinue() {
  if (S._otpVerifying) return;
  const codeSms = (S._otpCodeSms || '').trim();
  if (!codeSms || codeSms.length !== 4) {
    S._otpError = 'Please enter the 4-digit code we sent to your mobile.';
    render(true);
    return;
  }
  S._otpVerifying = true;
  S._otpError = '';
  render(true);

  try {
    const mobileWire = fullMobileForWire(S.mobile);
    const resp = await fetch('/api/otp/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: S.email.trim(),
        mobile: mobileWire,
        code_sms: codeSms,
        session_id: SESSION_ID,
        business_name: S.businessName.trim(),
        applicant_name: S.applicantName.trim(),
      }),
    });

    const bodyText = await resp.text();
    let data = null;
    try { data = bodyText ? JSON.parse(bodyText) : null; } catch (_) {}

    if (!resp.ok) {
      const msg = (data && data.detail)
        ? data.detail
        : `Server error (${resp.status}). Please try again.`;
      console.error('[otp/verify] failed:', resp.status, bodyText);
      if (data && data.traceback) console.error('[otp/verify] traceback:', data.traceback.join('\n'));
      throw new Error(msg);
    }

    S._otpVerified = true;
    S._otpVerifying = false;
    S._otpError = '';
    S._refNumber = (data && data.ref_number) || null;

    // Backend may rotate session_id if this verify started a fresh application
    // (e.g. user submitted before and is now starting another). Adopt the new
    // session_id from the response so subsequent calls go to the right row.
    if (data && data.session_id && data.session_id !== SESSION_ID) {
      SESSION_ID = data.session_id;
      try { localStorage.setItem('kyb_session_id', SESSION_ID); } catch (e) {}
    }
    render(true);

    // Advance to Page 2 once verified.
    const fromPg = curPage;
    curPage = 2;
    if (curPage > maxReachedPage) maxReachedPage = curPage;
    sessionPage(fromPg, curPage);
    scheduleDraftSave(PAGE_IDS[curPage], 200);  // small delay; app row now exists
    render();
  } catch (e) {
    S._otpVerifying = false;
    S._otpError = e.message || 'Verification failed. Please try again.';
    render(true);
  }
}

function otpChangeDetails() {
  // Reset OTP state so the user can edit Page 1 again. They'll have to resend.
  S._otpSent = false;
  S._otpVerified = false;
  S._otpCodeSms = '';
  S._otpError = '';
  S._otpResendCooldown = 0;
  if (window._otpCountdownTimer) {
    clearInterval(window._otpCountdownTimer);
    window._otpCountdownTimer = null;
  }
  render(true);
}

/* ============================================================
   LOV REGISTRY
   Loaded once from /api/lovs on page load. Cached in this module-local
   variable. All Selection / Multi-select fields render from this.
   ============================================================ */
let LOVS = null;
let _lovsLoadError = null;
let _lovsRetrying = false;

async function loadLovs(isRetry) {
  if (isRetry) _lovsRetrying = true;
  try {
    const resp = await fetch('/api/lovs', { cache: 'no-store' });
    if (!resp.ok) throw new Error('Server returned ' + resp.status);
    const data = await resp.json();
    if (!data || typeof data !== 'object' || Object.keys(data).length === 0) {
      throw new Error('Empty LOV registry');
    }
    LOVS = data;
    _lovsLoadError = null;
    _lovsRetrying = false;
    console.log('[LOVs] Loaded', Object.keys(LOVS).length, 'groups');
    if (isRetry) render(true);  // re-render once retry succeeds so dropdowns populate
  } catch (e) {
    console.error('[LOVs] Load failed:', e);
    _lovsLoadError = e.message || 'Network error';
    _lovsRetrying = false;
    // Don't fall back to an empty object — keep LOVS = null so dropdowns
    // can render a clear error state. Schedule one retry after 2 seconds
    // for transient network blips.
    if (!isRetry) {
      setTimeout(() => loadLovs(true), 2000);
    }
  }
}

function lovOptions(name, currentValue, includeBlank, blankLabel) {
  if (!LOVS) {
    // Either still loading on first render, or load failed. Render a placeholder
    // option so the dropdown is at least visible and not collapsed.
    return `<option value="">${_lovsLoadError ? '⚠ Could not load options' : 'Loading…'}</option>`;
  }
  if (!LOVS[name]) return '<option value="">(no options available)</option>';
  let html = '';
  if (includeBlank !== false) {
    html += `<option value="">${esc(blankLabel || 'Select...')}</option>`;
  }
  for (const opt of LOVS[name].options) {
    const sel = (currentValue === opt.code) ? 'selected' : '';
    html += `<option value="${esc(opt.code)}" ${sel}>${esc(opt.label)}</option>`;
  }
  return html;
}

function lovLabel(name, code) {
  if (!LOVS || !LOVS[name]) return code || '';
  for (const opt of LOVS[name].options) {
    if (opt.code === code) return opt.label;
  }
  return code || '';
}

function isMultiLov(name) {
  return !!(LOVS && LOVS[name] && LOVS[name].multi);
}

function lovCheckboxes(name, currentList, onChangeCallback) {
  if (!LOVS || !LOVS[name]) return '<div class="help">Loading...</div>';
  const list = Array.isArray(currentList) ? currentList : [];
  let html = '<div class="check-group">';
  for (const opt of LOVS[name].options) {
    const checked = list.includes(opt.code) ? 'checked' : '';
    const isSelected = list.includes(opt.code) ? 'selected' : '';
    html += `<label class="${isSelected}"><input type="checkbox" ${checked} onchange="${onChangeCallback}('${opt.code}')"> ${esc(opt.label)}</label>`;
  }
  html += '</div>';
  return html;
}

/* ============================================================
   FIELD STATUS — Pattern B for OCR review

   Status values:
     undefined / 'manual'  — customer typed it; no review needed
     'extracted'           — OCR populated the value; customer must review before submit
     'confirmed'           — customer reviewed (clicked "Looks correct" or edited the value)

   API:
     fieldStatus(path)              -> current status string
     setFieldStatus(path, status)   -> set the status
     markExtracted(path)            -> shorthand for setting 'extracted'
     confirmField(path)             -> shorthand for setting 'confirmed'
     anyUnreviewedFields()          -> array of paths still in 'extracted' state
     unreviewedCountOnPage(pageId)  -> count of unreviewed fields on a given page
   ============================================================ */
function fieldStatus(path)  { return S._fieldStatus[path]; }
function setFieldStatus(path, status) {
  if (!status) delete S._fieldStatus[path];
  else S._fieldStatus[path] = status;
}
function markExtracted(path) { setFieldStatus(path, 'extracted'); }
function confirmField(path)  { setFieldStatus(path, 'confirmed'); }
function anyUnreviewedFields() {
  return Object.keys(S._fieldStatus).filter(k => S._fieldStatus[k] === 'extracted');
}

/* When a customer edits a field that was 'extracted', auto-promote to 'confirmed'.
   Wires onto the binding helpers below. */
function autoConfirmOnEdit(path) {
  if (fieldStatus(path) === 'extracted') confirmField(path);
}

/* ============================================================
   OCR / EXTRACTION
   Backend has two paths:
     - /api/extract  — vision-based (sends image to extraction service directly). Best for IDs.
     - /api/llm-extract — text-based (we OCR with Tesseract.js, then ask the service to structure).
                          Better for documents with lots of text (TLs, VAT certs).
   For v5 we use /api/extract for everything since it's simpler and we already have
   the document image. If accuracy or cost becomes a problem, swap to text-based for TLs.
   ============================================================ */

async function serverVisionExtract(doc, docType) {
  // doc is { name, size, type, data (base64 dataURL) }
  if (!doc || !doc.data) return null;
  const base64 = doc.data.split(',')[1];  // strip the data:...;base64, prefix
  const formData = new FormData();
  // Reconstitute as Blob so the FastAPI endpoint receives it as UploadFile
  const byteString = atob(base64);
  const ia = new Uint8Array(byteString.length);
  for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
  const blob = new Blob([ia], { type: doc.type || 'application/octet-stream' });
  formData.append('file', blob, doc.name || 'doc');
  formData.append('doc_type', docType);

  const t0 = performance.now();
  const resp = await fetch('/api/extract', { method: 'POST', body: formData });
  const elapsed = Math.round(performance.now() - t0);

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    console.warn(`[Extract:${docType}] HTTP ${resp.status} after ${elapsed}ms`, err);
    throw new Error(err.detail || 'Extraction failed (' + resp.status + ')');
  }

  const data = await resp.json();
  // Developer-only console logging (not visible to customer)
  console.log(`[Extract:${docType}] ${elapsed}ms — response:`, data);

  // Server response shape: { success: true, fields: {...}, extraction_id: "..." }
  // Be tolerant of older shapes that returned the fields directly.
  const fields = (data && typeof data === 'object' && 'fields' in data) ? data.fields : data;
  if (!fields || typeof fields !== 'object') {
    console.warn(`[Extract:${docType}] Unexpected response shape:`, data);
    return null;
  }
  console.log(`[Extract:${docType}] parsed fields:`, fields);
  return fields;
}

async function matchLegalType(raw) {
  if (!raw) return { code: 'other', confident: false, raw: '' };
  const resp = await fetch('/api/match-legal-type', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ raw }),
  });
  if (!resp.ok) return { code: 'other', confident: false, raw };
  return await resp.json();
}

/* Trade License extraction — runs immediately after TL upload */
async function extractTradeLicense() {
  if (!S.tlDoc) return;
  S._tlExtracting = true; S._tlExtractError = '';
  render(true);
  try {
    const result = await serverVisionExtract(S.tlDoc, 'tradeLicense');
    if (!result) throw new Error('Empty extraction response');

    // Map of LLM-response keys to our state field names. Each entry tags whether
    // the field has a *reviewable UI on Page 2* — only those are marked 'extracted'.
    // Fields without UI are still captured for the payload but don't gate submission.
    const m = [
      // [responseKey, stateKey, hasReviewableUI]
      ['license_number',  'licenseNumber',  true],
      ['company_name',    'companyNameEn',  true],
      ['trade_name',      'tradeName',      true],
      ['issue_date',      'issueDate',      true],
      ['expiry_date',     'expiryDate',     true],
      ['register_number', 'registerNumber', false],  // not displayed on Page 2; captured but not reviewable
      ['activities',      'activitiesText', true],
    ];
    for (const [src, dst, reviewable] of m) {
      const v = result[src];
      if (v && String(v).trim()) {
        S.tl[dst] = String(v).trim();
        if (reviewable) markExtracted('tl.' + dst);
      }
    }

    // Emirate — try to match against the LOV
    if (result.emirate) {
      const norm = String(result.emirate).trim().toLowerCase();
      const map = { 'abu dhabi': 'abu_dhabi', 'dubai': 'dubai', 'sharjah': 'sharjah',
                    'ajman': 'ajman', 'umm al quwain': 'uaq', 'uaq': 'uaq',
                    'ras al khaimah': 'rak', 'rak': 'rak', 'fujairah': 'fujairah' };
      const matched = Object.keys(map).find(k => norm.includes(k));
      if (matched) {
        S.tl.emirate = map[matched];
        markExtracted('tl.emirate');
      }
    }

    // Legal type — match via backend
    if (result.legal_type) {
      S.tl.legalTypeRaw = String(result.legal_type).trim();
      const match = await matchLegalType(result.legal_type);
      S.tl.legalType = match.code;
      markExtracted('tl.legalType');
      // Auto-derive structureType from legal type for sole-owner cases
      const soleOwner = ['sole_proprietorship','opc','llc_single','fze'];
      if (soleOwner.includes(match.code) && !S.structureType) {
        S.structureType = 'sole_owner';
      } else if (!soleOwner.includes(match.code) && match.confident && !S.structureType) {
        S.structureType = 'multi';
      }
    }
  } catch (e) {
    console.error('[TL Extract]', e);
    S._tlExtractError = 'unable_to_read';
  }
  S._tlExtracting = false;
  render(true);
}

/* Emirates ID extraction — runs when both front and back are uploaded */
async function extractEID() {
  const a = S.authoriser;
  if (!a.eidFrontDoc) return;
  S._eidExtracting = true; S._eidExtractError = '';
  render(true);
  try {
    const front = await serverVisionExtract(a.eidFrontDoc, 'emiratesIdFront');
    if (front) {
      const setIf = (k, v) => { if (v && String(v).trim()) { a[k] = String(v).trim(); markExtracted('authoriser.' + k); } };
      // Names — split if only full_name present
      if (front.first_name) setIf('firstName', front.first_name);
      else if (front.full_name) {
        const parts = String(front.full_name).trim().split(/\s+/);
        if (parts.length >= 1) setIf('firstName', parts[0]);
        if (parts.length >= 2) setIf('lastName', parts.slice(-1)[0]);
        if (parts.length >= 3) setIf('middleName', parts.slice(1, -1).join(' '));
      }
      if (front.last_name) setIf('lastName', front.last_name);
      setIf('eidNumber', front.card_number);
      setIf('dob', front.date_of_birth);
      setIf('eidExpiryDate', front.expiry_date);
      // Gender, nationality — map to LOV codes
      if (front.gender) {
        const g = String(front.gender).trim().toLowerCase();
        a.gender = g.startsWith('m') ? 'male' : (g.startsWith('f') ? 'female' : '');
        if (a.gender) markExtracted('authoriser.gender');
      }
      if (front.nationality) {
        const matched = matchCountry(front.nationality);
        if (matched) {
          a.nationality = matched;
          a.citizenship = matched;
          markExtracted('authoriser.nationality');
        }
      }
    }
    if (a.eidBackDoc) {
      const back = await serverVisionExtract(a.eidBackDoc, 'emiratesIdBack');
      if (back) {
        // EID back sometimes has father's name in Arabic; not reliably extractable from English-only OCR
        if (back.card_number && !a.eidNumber) {
          a.eidNumber = String(back.card_number).trim();
          markExtracted('authoriser.eidNumber');
        }
      }
    }
    a.idType = 'emirates_id';
  } catch (e) {
    console.error('[EID Extract]', e);
    S._eidExtractError = 'unable_to_read';
  }
  S._eidExtracting = false;
  render(true);
}

async function extractPassport() {
  const a = S.authoriser;
  if (!a.passportDoc) return;
  S._passportExtracting = true; S._passportExtractError = '';
  render(true);
  try {
    const result = await serverVisionExtract(a.passportDoc, 'passport');
    if (result) {
      const setIf = (k, v) => { if (v && String(v).trim()) { a[k] = String(v).trim(); markExtracted('authoriser.' + k); } };
      // Names from full_name if individual not provided
      if (result.full_name && !result.first_name) {
        const parts = String(result.full_name).trim().split(/\s+/);
        if (parts.length >= 1) setIf('firstName', parts[0]);
        if (parts.length >= 2) setIf('lastName', parts.slice(-1)[0]);
        if (parts.length >= 3) setIf('middleName', parts.slice(1, -1).join(' '));
      } else {
        setIf('firstName', result.first_name);
        setIf('lastName', result.last_name);
      }
      setIf('passportNumber', result.passport_number);
      setIf('dob', result.date_of_birth);
      setIf('passportExpiryDate', result.expiry_date);
      setIf('placeOfBirth', result.place_of_birth);
      setIf('passportIssuanceDate', result.issuance_date || result.date_of_issue);
      // Father's name — passport bio page sometimes has it
      setIf('fatherName', result.father_name);
      // Gender
      if (result.gender) {
        const g = String(result.gender).trim().toLowerCase();
        a.gender = g.startsWith('m') ? 'male' : (g.startsWith('f') ? 'female' : '');
        if (a.gender) markExtracted('authoriser.gender');
      }
      // Nationality / issuing country
      if (result.nationality) {
        const matched = matchCountry(result.nationality);
        if (matched) {
          a.nationality = matched;
          a.citizenship = matched;
          markExtracted('authoriser.nationality');
        }
      }
      if (result.issuing_country) {
        const matched = matchCountry(result.issuing_country);
        if (matched) {
          a.passportIssuanceCountry = matched;
          markExtracted('authoriser.passportIssuanceCountry');
        }
      }
    }
    if (!a.idType) a.idType = 'passport';
  } catch (e) {
    console.error('[Passport Extract]', e);
    S._passportExtractError = 'unable_to_read';
  }
  S._passportExtracting = false;
  render(true);
}

/* Match an OCR'd country/nationality label to our country LOV alpha-2 code */
function matchCountry(raw) {
  if (!raw || !LOVS || !LOVS.country) return '';
  const norm = String(raw).trim().toLowerCase();
  // Common aliases
  const aliases = {
    'uae': 'AE', 'united arab emirates': 'AE', 'emirati': 'AE', 'emirian': 'AE',
    'india': 'IN', 'indian': 'IN',
    'pakistan': 'PK', 'pakistani': 'PK',
    'philippines': 'PH', 'filipino': 'PH', 'filipina': 'PH',
    'egypt': 'EG', 'egyptian': 'EG',
    'jordan': 'JO', 'jordanian': 'JO',
    'syria': 'SY', 'syrian': 'SY',
    'lebanon': 'LB', 'lebanese': 'LB',
    'iran': 'IR', 'iranian': 'IR',
    'iraq': 'IQ', 'iraqi': 'IQ',
    'saudi arabia': 'SA', 'saudi': 'SA', 'saudi arabian': 'SA',
    'kuwait': 'KW', 'kuwaiti': 'KW',
    'oman': 'OM', 'omani': 'OM',
    'qatar': 'QA', 'qatari': 'QA',
    'bahrain': 'BH', 'bahraini': 'BH',
    'yemen': 'YE', 'yemeni': 'YE',
    'sudan': 'SD', 'sudanese': 'SD',
    'morocco': 'MA', 'moroccan': 'MA',
    'tunisia': 'TN', 'tunisian': 'TN',
    'palestine': 'PS', 'palestinian': 'PS',
    'bangladesh': 'BD', 'bangladeshi': 'BD',
    'sri lanka': 'LK', 'sri lankan': 'LK',
    'nepal': 'NP', 'nepali': 'NP', 'nepalese': 'NP',
    'united kingdom': 'GB', 'british': 'GB', 'uk': 'GB', 'great britain': 'GB',
    'united states': 'US', 'american': 'US', 'usa': 'US', 'us': 'US',
    'china': 'CN', 'chinese': 'CN',
    'germany': 'DE', 'german': 'DE',
    'france': 'FR', 'french': 'FR',
    'italy': 'IT', 'italian': 'IT',
    'spain': 'ES', 'spanish': 'ES',
    'turkey': 'TR', 'turkish': 'TR',
    'russia': 'RU', 'russian': 'RU',
    'canada': 'CA', 'canadian': 'CA',
    'australia': 'AU', 'australian': 'AU',
  };
  if (aliases[norm]) return aliases[norm];
  // Look up by exact label match in LOVS
  for (const opt of LOVS.country.options) {
    if (opt.label.toLowerCase() === norm) return opt.code;
  }
  // Or by alpha-2 code
  for (const opt of LOVS.country.options) {
    if (opt.code.toLowerCase() === norm) return opt.code;
  }
  return '';
}

/* ============================================================
   FLOW LOGIC
   ============================================================ */
function isSoleOwnerFlow() { return S.structureType === 'sole_owner'; }
function isMultiFlow()     { return S.structureType === 'multi'; }
function effectiveShareholderCount() {
  if (isSoleOwnerFlow()) return 1;
  if (S.shareholderCount === 'more') return 4;
  return parseInt(S.shareholderCount) || 0;
}
function effectiveSignatoryCount() {
  if (isSoleOwnerFlow()) return 1;
  return parseInt(S.signatoryCount) || 1;
}
function isSignatoryANewPerson(i) { return S.signatories[i] && S.signatories[i].mode === 'new'; }
function anySignatoryIsNew() {
  if (!isMultiFlow()) return false;
  for (let i = 0; i < effectiveSignatoryCount(); i++) {
    if (isSignatoryANewPerson(i)) return true;
  }
  return false;
}
function externalSignatoryActive() {
  return isSoleOwnerFlow() && S.ownerIsSignatory === 'no';
}
function poaRequired() {
  // POA needed when there's a signatory who is NOT a shareholder/owner
  return externalSignatoryActive() || anySignatoryIsNew();
}

/* ============================================================
   REVIEW-AWARE FIELD RENDERING

   reviewClass(path)  — returns 'review-extracted' | 'review-confirmed' | '' to put
                       on the .field wrapper. Drives the amber/green background.

   Per-field "Review" badges and inline hints have been retired in favour of a
   single section-level "Confirm extracted details" banner. The amber→green
   colour transition still happens at the field level so customers can see
   what was extracted vs what they typed.
   ============================================================ */
function reviewClass(path) {
  const s = fieldStatus(path);
  if (s === 'extracted') return 'review-extracted';
  if (s === 'confirmed') return 'review-confirmed';
  return '';
}
// Stubs kept so existing render code can still call them harmlessly. Returning
// an empty string means they render to nothing.
function reviewBadge(_path) { return ''; }
function reviewHint(_path)  { return ''; }

/* Section-level review banner.
   pathPrefix — the dotted path prefix all extracted fields share, e.g. 'tl.' or 'authoriser.'
   label      — the user-facing label of the document, e.g. "Trade License"

   Behaviour:
     - Returns nothing if no fields under pathPrefix are in 'extracted' state
       (nothing to review or already all confirmed).
     - Otherwise, renders a banner with a "Confirm extracted details" button
       that calls confirmAllUnderPrefix() to mark them all confirmed.
*/
function sectionReviewBanner(pathPrefix, label) {
  const pending = anyUnreviewedFields().filter(p => p.startsWith(pathPrefix));
  if (pending.length === 0) return '';
  return `<div class="section-review-banner">
    <span class="label">We've extracted ${pending.length} field${pending.length>1?'s':''} from your ${esc(label)}. Please review the values below — they're highlighted in amber. If everything looks right, click confirm. You can still edit any field.</span>
    <button onclick="confirmAllUnderPrefix('${pathPrefix}');render(true)">✓ Looks good — confirm</button>
  </div>`;
}

function confirmAllUnderPrefix(prefix) {
  const paths = Object.keys(S._fieldStatus).filter(p => p.startsWith(prefix) && S._fieldStatus[p] === 'extracted');
  paths.forEach(p => confirmField(p));
}

/* Empty-required field cue.
   Returns 'field-required-empty' when:
     - the value is empty / falsy / empty string
     - AND the field is required (caller passes required = true)
   Caller signals required by passing the explicit boolean. */
function emptyRequiredClass(value, required) {
  if (!required) return '';
  if (value === undefined || value === null) return 'field-required-empty';
  if (typeof value === 'string' && value.trim() === '') return 'field-required-empty';
  if (Array.isArray(value) && value.length === 0) return 'field-required-empty';
  return '';
}

/* Combine reviewClass and emptyRequiredClass into the final .field class string. */
function fieldClass(path, value, required) {
  return [reviewClass(path), emptyRequiredClass(value, required)].filter(Boolean).join(' ');
}

/* Multi-select helpers — checkboxes from a LOV, with optional 'other' free-text.
   togglePath is the dotted path of the array (e.g., 'authoriser.sourceOfIncome').
   otherTextPath is the path of the free-text field (e.g., 'authoriser.sourceOfIncomeOther').
*/
function toggleNestedArr(path, val) {
  const arr = getNested(path);
  if (!Array.isArray(arr)) return;
  const i = arr.indexOf(val);
  if (i === -1) arr.push(val); else arr.splice(i, 1);
  render(true);
}
function multiSelectLov(lovName, listPath, otherTextPath) {
  if (!LOVS || !LOVS[lovName]) return '<div class="help">Loading...</div>';
  const list = getNested(listPath) || [];
  let html = '<div class="check-group">';
  for (const opt of LOVS[lovName].options) {
    const checked = list.includes(opt.code) ? 'checked' : '';
    const isSel = list.includes(opt.code) ? 'selected' : '';
    html += `<label class="${isSel}"><input type="checkbox" ${checked} onchange="toggleNestedArr('${listPath}','${opt.code}')"> ${esc(opt.label)}</label>`;
  }
  html += '</div>';
  // 'Other' free-text field
  if (otherTextPath && list.includes('other')) {
    const cur = getNested(otherTextPath) || '';
    html += `<div class="other-text-input">
      <label>Please specify</label>
      <input type="text" value="${esc(cur)}" ${bn(otherTextPath)} placeholder="Briefly describe">
    </div>`;
  }
  return html;
}

function setNested(path, val) {
  const tokens = path.replace(/\[(\d+)\]/g, '.$1').split('.');
  let obj = S;
  for (let i = 0; i < tokens.length - 1; i++) {
    obj = obj[isNaN(tokens[i]) ? tokens[i] : parseInt(tokens[i])];
  }
  const last = tokens[tokens.length - 1];
  obj[isNaN(last) ? last : parseInt(last)] = val;
}
function getNested(path) {
  const tokens = path.replace(/\[(\d+)\]/g, '.$1').split('.');
  let obj = S;
  for (const t of tokens) {
    if (obj == null) return undefined;
    obj = obj[isNaN(t) ? t : parseInt(t)];
  }
  return obj;
}

function sel(cls, isSelected) { return isSelected ? cls + ' selected' : cls; }
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   DATE HELPERS

   The browser's native <input type="date"> shows whatever format the user's
   locale uses (often MM/DD/YYYY in US, DD/MM/YYYY elsewhere). This causes
   confusion when reading dates back. We keep the native picker (good UX
   for selection) but always echo the parsed date below the input in
   unambiguous DD-MMM-YYYY format (e.g., "15-Mar-2026").

   Backend storage is always ISO YYYY-MM-DD — no change there.

   formatDateDisplay(iso) — convert "2026-03-15" -> "15-Mar-2026"; returns ''
                            for empty / invalid input.
   isExpiredDate(iso)    — true if the date is strictly before today.
============================================================ */
const _MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatDateDisplay(iso) {
  if (!iso || typeof iso !== 'string') return '';
  // Accept "YYYY-MM-DD" or "YYYY-MM-DDTHH:MM:SS..."
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  const yyyy = parseInt(m[1], 10);
  const mm   = parseInt(m[2], 10);
  const dd   = parseInt(m[3], 10);
  if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return '';
  return `${String(dd).padStart(2,'0')}-${_MONTHS_SHORT[mm-1]}-${yyyy}`;
}

function isExpiredDate(iso) {
  if (!iso || typeof iso !== 'string') return false;
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return false;
  const target = new Date(`${iso.substring(0,10)}T00:00:00`);
  if (isNaN(target.getTime())) return false;
  const today = new Date();
  today.setHours(0,0,0,0);
  return target < today;
}

// Mandatory / Optional badge for document slots
function docBadge(required) {
