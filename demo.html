  return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;background:#eef2f6;color:#5b6670;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-left:8px;vertical-align:middle">Optional</span>`;
}

function fileUpload(path, label, hint, icon) {
  const existing = getNested(path);
  if (existing && typeof existing === 'object') {
    // Upload-status indicator shown next to the filename
    let statusBadge = '';
    if (existing.uploadStatus === 'uploading') {
      statusBadge = `<span style="color:#7a6438;font-size:11px;margin-left:8px;font-weight:600">⏳ uploading…</span>`;
    } else if (existing.uploadStatus === 'done') {
      statusBadge = `<span style="color:#3d6a1f;font-size:11px;margin-left:8px;font-weight:600">✓ uploaded</span>`;
    } else if (existing.uploadStatus === 'failed') {
      statusBadge = `<span style="color:#a13b3b;font-size:11px;margin-left:8px;font-weight:600" title="${esc(existing.uploadError||'')}">⚠ upload failed</span>`;
    }
    return `<div class="upload-preview">
      ${existing.thumb ? `<img src="${existing.thumb}" alt="">` : `<div style="width:48px;height:48px;background:var(--beige);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px">📄</div>`}
      <div>
        <div class="file-name">${esc(existing.name)}${statusBadge}</div>
        <div class="file-size">${(existing.size/1024).toFixed(0)} KB</div>
      </div>
      <button class="remove-btn" onclick="setNested('${path}',null);render()">✕</button>
    </div>`;
  }
  const safeId = 'file_' + path.replace(/[^a-zA-Z0-9]/g, '_');
  return `<div class="upload-box">
    <input type="file" id="${safeId}" accept=".pdf,image/*" onchange="handleFile(this,'${path}')" style="display:none">
    <label for="${safeId}" style="cursor:pointer;display:block">
      <div class="upload-icon">${icon || '📄'}</div>
      <div class="upload-label">${label}</div>
      <div class="upload-hint">${hint}</div>
    </label>
  </div>`;
}

function handleFile(input, path) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    S._validationMsg = 'File is larger than 10 MB. Please upload a smaller file.';
    render(true);
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = e.target.result;
    const thumb = file.type.startsWith('image/') ? data : '';
    setNested(path, {
      name: file.name, size: file.size, type: file.type,
      data: data, thumb: thumb,
      uploadStatus: 'uploading',
      file_id: null,
    });
    render(true);
    // Kick off the server upload in parallel — non-blocking.
    uploadFileToServer(file, path);
    // Hook auto-extraction for documents we OCR
    triggerExtractionIfNeeded(path);
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   SERVER UPLOAD — /api/upload
   ============================================================
   Sends the file to the backend so it lands on disk and gets a row
   in the `documents` table. Until this completes, the local state
   has `uploadStatus: 'uploading'` and no `file_id`. On success,
   `file_id` is filled in. On failure, status becomes `failed` and
   the applicant sees a small warning under the file.

   We never block the UI on this — extraction (OCR) runs in parallel,
   and the applicant can move on through the form. At submit time we
   wait briefly for any still-uploading files to finish before sending
   the payload.
   ============================================================ */
async function uploadFileToServer(file, path) {
  const meta = pathToDocMeta(path);
  const fd = new FormData();
  fd.append('file', file);
  fd.append('doc_key',  path);
  fd.append('doc_type', meta.doc_type);
  fd.append('session_id', SESSION_ID);
  if (meta.person_role !== null)  fd.append('person_role',  meta.person_role);
  if (meta.person_index !== null) fd.append('person_index', meta.person_index);

  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: fd });
    const bodyText = await resp.text();
    let data = null;
    try { data = bodyText ? JSON.parse(bodyText) : null; } catch (_) {}
    if (!resp.ok) {
      const msg = (data && data.detail) ? data.detail : `Server error (${resp.status})`;
      console.error('[/api/upload] failed:', resp.status, bodyText);
      if (data && data.traceback) console.error('traceback:', data.traceback.join('\n'));
      throw new Error(msg);
    }
    // Merge the file_id back into the local state for this slot
    const existing = getNested(path);
    if (existing && typeof existing === 'object') {
      existing.file_id = data.file_id;
      existing.uploadStatus = 'done';
      setNested(path, existing);
    }
    console.log(`[upload] ${path} → file_id ${data.file_id}`);
  } catch (e) {
    console.error(`[upload] ${path} failed:`, e);
    const existing = getNested(path);
    if (existing && typeof existing === 'object') {
      existing.uploadStatus = 'failed';
      existing.uploadError = e.message || 'Upload failed';
      setNested(path, existing);
      render(true);
    }
  }
}

/* Map a frontend state path to the metadata the backend wants.
   Returns { doc_type, person_role, person_index }.
   doc_type matches the keys in server.py OCR_PROMPTS where applicable;
   for slots without OCR (MOA, AOA, etc.) it's just a descriptive label. */
function pathToDocMeta(path) {
  // Person-specific paths first (most specific match wins)
  // shIdDocs[N].eidFront / eidBack / passport
  let m = path.match(/^shIdDocs\[(\d+)\]\.(eidFront|eidBack|passport)$/);
  if (m) return { doc_type: _docTypeFromIdSlot(m[2]), person_role: 'shareholder', person_index: parseInt(m[1], 10) };

  // sigIdDocs[N].eidFront / eidBack / passport
  m = path.match(/^sigIdDocs\[(\d+)\]\.(eidFront|eidBack|passport)$/);
  if (m) return { doc_type: _docTypeFromIdSlot(m[2]), person_role: 'signatory', person_index: parseInt(m[1], 10) };

  // externalSignatoryIdDoc.eidFront / eidBack / passport
  m = path.match(/^externalSignatoryIdDoc\.(eidFront|eidBack|passport)$/);
  if (m) return { doc_type: _docTypeFromIdSlot(m[1]), person_role: 'external_signatory', person_index: 0 };

  // entityShTLs[N]
  m = path.match(/^entityShTLs\[(\d+)\]$/);
  if (m) return { doc_type: 'entityShareholderTradeLicense', person_role: 'entity_shareholder', person_index: parseInt(m[1], 10) };

  // authoriser.* — authoriser is a single person, no index
  m = path.match(/^authoriser\.(eidFrontDoc|eidBackDoc|passportDoc)$/);
  if (m) {
    const slot = m[1].replace('Doc', '');                 // 'eidFront' | 'eidBack' | 'passport'
    return { doc_type: _docTypeFromIdSlot(slot), person_role: 'authoriser', person_index: null };
  }

  // Top-level company docs
  const simpleMap = {
    tlDoc:               'tradeLicense',
    vatCertDoc:          'vatCertificate',
    vatReturnDoc:        'vatReturn',
    tenancyContractDoc:  'tenancyContract',
    moaDoc:              'memorandumOfAssociation',
    aoaDoc:              'articlesOfAssociation',
    shareCertDoc:        'shareCertificate',
    boardResolutionDoc:  'boardResolution',
    mohreDoc:            'mohreEmployeeList',
    poaDoc:              'powerOfAttorney',
    additionalDocs:      'additional',
    fatcaW8W9Doc:        'fatcaForm',
  };
  if (simpleMap[path]) return { doc_type: simpleMap[path], person_role: null, person_index: null };

  // Fallback — unknown slot. Still uploadable; ops can sort out from doc_slot_key.
  return { doc_type: 'unknown', person_role: null, person_index: null };
}

function _docTypeFromIdSlot(slot) {
  if (slot === 'eidFront') return 'emiratesIdFront';
  if (slot === 'eidBack')  return 'emiratesIdBack';
  if (slot === 'passport') return 'passport';
  return 'unknown';
}

/* At submit time we wait briefly for any in-flight uploads to finish.
   Returns true if all uploads are done; false if any failed or still
   pending after the timeout. */
async function awaitPendingUploads(maxWaitMs) {
  const deadline = Date.now() + (maxWaitMs || 10000);
  while (Date.now() < deadline) {
    const allFiles = collectAllFileSlots(S);
    const pending = allFiles.filter(f => f.uploadStatus === 'uploading');
    if (pending.length === 0) return true;
    await new Promise(r => setTimeout(r, 500));
  }
  return false;
}

/* Walk the state tree and collect every {name, type, uploadStatus, ...}
   object — these are file slots. Used by awaitPendingUploads(). */
function collectAllFileSlots(node, out) {
  out = out || [];
  if (node && typeof node === 'object') {
    // Detect a file object: has name + size + type + uploadStatus
    if (typeof node.name === 'string' && typeof node.size === 'number' &&
        typeof node.type === 'string' && 'uploadStatus' in node) {
      out.push(node);
      return out;
    }
    if (Array.isArray(node)) {
      for (const item of node) collectAllFileSlots(item, out);
    } else {
      for (const k of Object.keys(node)) collectAllFileSlots(node[k], out);
    }
  }
  return out;
}

/* Decide which extraction to run based on which path was just uploaded. */
function triggerExtractionIfNeeded(path) {
  if (path === 'tlDoc') {
    extractTradeLicense();
  } else if (path === 'authoriser.eidFrontDoc' || path === 'authoriser.eidBackDoc') {
    // Wait for both sides if we know we'll get both; extract front as soon as it lands.
    if (S.authoriser.eidFrontDoc) extractEID();
  } else if (path === 'authoriser.passportDoc') {
    extractPassport();
  } else if (path === 'vatCertDoc') {
    extractVATCert();
  } else if (path === 'tenancyContractDoc') {
    extractTenancy();
  }
  // For shareholder / signatory IDs we keep extraction manual (out of scope for v5;
  // ops reads those documents). Multi-shareholder OCR is deferred.
}

/* ============================================================
   UAE MOBILE FORMAT — Page 1 applicant mobile
   ============================================================
   We accept only UAE mobile numbers on Page 1 (the applicant is a
   UAE resident by definition — that's the customer Mawarid is taking on).
   The authoriser may be a foreigner, so authoriser.mobile elsewhere is
   not subject to this rule.

   Storage:  S.mobile stores the 9-digit local part only (e.g. "501234567").
   On the wire to backend, we prepend "+971-" → "+971-501234567" (LSQ format).
   ============================================================ */

function setMobileInput(el) {
  // Strip everything that isn't a digit
  let v = el.value.replace(/\D/g, '');
  // If they pasted "0501234567" or "971501234567", drop the leading prefix
  if (v.startsWith('971')) v = v.slice(3);
  if (v.startsWith('0')) v = v.slice(1);
  // Cap at 9 digits
  v = v.slice(0, 9);
  S.mobile = v;
  // Reflect the cleaned value back into the field
  if (el.value !== v) el.value = v;
  // Refresh the OTP button state (live; same pattern as the other fields)
  updateOtpSendButtonState();
}

function isValidUaeMobile(s) {
  return /^5\d{8}$/.test((s || '').trim());
}

function fullMobileForWire(s) {
  // Produce the LSQ format. Returns null if input isn't valid.
  return isValidUaeMobile(s) ? `+971-${s.trim()}` : null;
}

function displayUaeMobile(s) {
  // Pretty-print: "501234567" → "+971 50 123 4567"
  if (!isValidUaeMobile(s)) return s || '';
  return `+971 ${s.slice(0,2)} ${s.slice(2,5)} ${s.slice(5)}`;
}

// Called by the input listener on Page 1 contact fields. Toggles the
// "Send verification code" button enabled state in place — no re-render,
// so the field the user is typing in keeps its focus.
function updateOtpSendButtonState() {
  const btn  = document.getElementById('otpSendBtn');
  const hint = document.getElementById('otpSendHint');
  if (!btn) return;
  const ok = canRequestOtp();
  btn.disabled = !ok || S._otpSending;
  if (hint) hint.style.display = ok ? 'none' : '';
}

</div>

<div class="section">
  <h2>Politically Exposed Person (PEP)</h2>
  <p class="intro">A PEP is someone who holds (or has held) a prominent public position — for example, a head of state, senior politician, judge, military officer, or senior executive of a state-owned enterprise. This also includes close family members and associates of such a person.</p>
  <div class="field ${fieldClass('authoriser.isPep', A.isPep, true)}">
    <label>Are you a PEP, or a close family member or associate of one? <span class="req">*</span></label>
    <select ${bseln('authoriser.isPep')}>${lovOptions('is_pep', A.isPep, true, 'Select...')}</select>
  </div>
  ${A.isPep && A.isPep !== 'no' ? `
  <div class="field ${emptyRequiredClass(A.pepPositionCountry, true)}"><label>Position &amp; Country <span class="req">*</span></label><input type="text" value="${esc(A.pepPositionCountry)}" ${bn('authoriser.pepPositionCountry')} placeholder="e.g., Senior diplomat — France"></div>
  <div class="field ${emptyRequiredClass(A.pepSourceOfWealthNarrative, true)}"><label>Source of Wealth — please describe <span class="req">*</span></label><textarea ${bn('authoriser.pepSourceOfWealthNarrative')} rows="3" placeholder="Briefly describe how the wealth was accumulated">${esc(A.pepSourceOfWealthNarrative)}</textarea></div>
  ` : ''}
</div>

<div class="section">
  <h2>Source of Wealth</h2>
  <div class="field ${emptyRequiredClass(A.sourceOfWealth, true)}">

    <div class="help" style="margin-bottom:6px">Select all that apply.</div>
    ${multiSelectLov('source_of_wealth', 'authoriser.sourceOfWealth', 'authoriser.sourceOfWealthOther')}
  </div>
</div>

<div class="section">
  <h2>Sanctions / Regulatory</h2>
  <div class="field">
    <label>Have you been subject to financial sanctions, regulatory action, or criminal proceedings? <span class="req">*</span></label>
    <div class="radio-group">
      <label class="${sel('', A.sanctions==='no')}"><input type="radio" name="asanc" ${A.sanctions==='no'?'checked':''} onchange="S.authoriser.sanctions='no';render(true)"> No</label>
      <label class="${sel('', A.sanctions==='yes')}"><input type="radio" name="asanc" ${A.sanctions==='yes'?'checked':''} onchange="S.authoriser.sanctions='yes';render(true)"> Yes</label>
    </div>
  </div>
  ${A.sanctions === 'yes' ? `
  <div class="field"><label>Brief description <span class="req">*</span></label><textarea ${bn('authoriser.sanctionsDescription')} rows="2">${esc(A.sanctionsDescription)}</textarea></div>` : ''}
</div>

<div class="section">
  <h2>Account Profile</h2>
  <div class="field ${emptyRequiredClass(C.estimatedMonthlyTurnover, true)}">
    <label>Estimated Monthly Turnover of the Account <span class="req">*</span></label>
    <select ${bseln('corporate.estimatedMonthlyTurnover')}>${lovOptions('estimated_monthly_turnover', C.estimatedMonthlyTurnover, true, 'Select range...')}</select>
  </div>
  <div class="field">
    <label>Annual Expected Turnover</label>
    <select ${bseln('corporate.annualExpectedTurnover')}>${lovOptions('annual_expected_turnover', C.annualExpectedTurnover, true, 'Select range...')}</select>
  </div>
  <div class="field ${emptyRequiredClass(C.purposeOfAccount, true)}">
    <label>Purpose of the Account <span class="req">*</span></label>
    <div class="help" style="margin-bottom:6px">Select all that apply.</div>
    ${multiSelectLov('purpose_of_account', 'corporate.purposeOfAccount', 'corporate.purposeOfAccountOther')}
  </div>
  <div class="field">
    <label>Source of Funds (for the account)</label>
    <div class="help" style="margin-bottom:6px">Where the money flowing through the account will come from. Defaults from your Source of Income.</div>
    ${multiSelectLov('source_of_funds', 'corporate.sourceOfFunds', 'corporate.sourceOfFundsOther')}
  </div>
</div>`;
    }

    // External signatory section (when ownerIsSignatory === 'no')
    if (S.ownerIsSignatory === 'no') {
      const ext = S.externalSignatory;
      html += `
<div class="section">
  <h2>Authorised Signatory</h2>
  <p class="intro">The person legally empowered to enter into binding agreements on behalf of your business.</p>
  <div class="field">
    <label>Full Name <span class="req">*</span></label>
    <input type="text" value="${esc(ext.name)}" ${bn('externalSignatory.name')} placeholder="As per Emirates ID or Passport">
  </div>
  <div class="field-row">
    <div class="field">
      <label>Nationality <span class="req">*</span></label>
      <select ${bseln('externalSignatory.nationality')}>${lovOptions('country', ext.nationality, true, 'Select...')}</select>
    </div>
    <div class="field">
      <label>UAE Resident? <span class="req">*</span></label>
      <select ${bseln('externalSignatory.isUaeResident')}>
        <option value="yes" ${ext.isUaeResident==='yes'?'selected':''}>Yes — has Emirates ID</option>
        <option value="no" ${ext.isUaeResident==='no'?'selected':''}>No — will upload Passport</option>
      </select>
    </div>
  </div>
  <div class="field-row">
    <div class="field"><label>Email</label><input type="email" value="${esc(ext.email)}" ${bn('externalSignatory.email')}></div>
    <div class="field"><label>Mobile</label><input type="tel" value="${esc(ext.mobile)}" ${bn('externalSignatory.mobile')}></div>
  </div>
  <div style="margin-top:6px">
    <label style="font-size:13px;color:var(--text);font-weight:600">Signatory's ID <span class="req">*</span></label>
    ${idUploadBlock(ext, 'externalSignatoryIdDoc', true)}
  </div>
  <div class="field" style="margin-top:18px">
    <label>Power of Attorney <span class="req">*</span></label>
    <div class="help" style="margin-bottom:6px">A signed POA authorising ${esc(ext.name) || 'this person'} to act on behalf of your business.</div>
    ${fileUpload('poaDoc', 'Upload POA', 'PDF · Max 10 MB', '📄')}
  </div>
  <div class="field">
    <label>Is this person a PEP? <span class="req">*</span></label>
    <select ${bseln('externalSignatory.isPep')}>${lovOptions('is_pep', ext.isPep, true, 'Select...')}</select>
  </div>
</div>`;
    }

    return html;
  }

  /* ============ MULTI-SHAREHOLDER PATH ============ */
  html += pageHead(3, 'About You & Your Shareholders', "Tell us about yourself as the applicant, then list the shareholders and signatories.");

  // Q: Is the applicant filling the form the authoriser?
  html += applicantIsAuthoriserBlock();

  // Authoriser block (the applicant — they get their own Retail CIF)
  html += `
<div class="section">
  <h2>About You</h2>
  <p class="intro">A few basics about you as the applicant. Upload your ID — we'll auto-fill the rest.</p>
  <div class="field-row">
    <div class="field"><label>Emirates ID — Front</label>${fileUpload('authoriser.eidFrontDoc', 'Upload front', 'JPG / PNG', '🪪')}</div>
    <div class="field"><label>Emirates ID — Back</label>${fileUpload('authoriser.eidBackDoc', 'Upload back', 'JPG / PNG', '🪪')}</div>
  </div>
  ${S._eidExtracting ? `<div class="ocr-status extracting"><div class="ocr-spinner"></div> Reading your Emirates ID…</div>` : ''}
  ${sectionReviewBanner('authoriser.', 'Emirates ID')}
  <div class="field-row">
    ${authIdField('firstName', 'First Name', 'text', true)}
    ${authIdField('lastName', 'Last Name', 'text', true)}
  </div>
  <div class="field-row">
    ${authSelectField('nationality', 'Nationality', 'country', 'Select...', true)}
    ${authIdField('dob', 'Date of Birth', 'date', true)}
  </div>
  <div class="field">
    <label>Are you a PEP? <span class="req">*</span></label>
    <select ${bseln('authoriser.isPep')}>${lovOptions('is_pep', A.isPep, true, 'Select...')}</select>
  </div>
</div>`;

  // Shareholders (with inline ID upload for individuals; entity TL for entities)
  html += `<div class="section"><h2>Shareholders</h2></div>`;
  for (let i = 0; i < shCount; i++) {
    const sh = S.shareholders[i];
    html += `
<div class="section">
  <h2>Shareholder ${i+1}</h2>
  ${S.hasEntityShareholders==='yes' ? `
  <div class="field">
    <label>Type <span class="req">*</span></label>
    <div class="radio-group">
      <label class="${sel('', sh.isEntity==='no')}"><input type="radio" name="shtype${i}" ${sh.isEntity==='no'?'checked':''} ${bradn(`shareholders[${i}].isEntity`,'no')}> Individual</label>
      <label class="${sel('', sh.isEntity==='yes')}"><input type="radio" name="shtype${i}" ${sh.isEntity==='yes'?'checked':''} ${bradn(`shareholders[${i}].isEntity`,'yes')}> Company (entity)</label>
    </div>
  </div>` : ''}
  <div class="field-row">
    <div class="field">
      <label>${sh.isEntity === 'yes' ? 'Company Name' : 'Full Name'} <span class="req">*</span></label>
      <input type="text" value="${esc(sh.name)}" ${bn(`shareholders[${i}].name`)} placeholder="${sh.isEntity === 'yes' ? 'Registered company name' : 'Full name'}">
    </div>
    <div class="field">
      <label>Shareholding % <span class="req">*</span></label>
      <input type="number" value="${esc(sh.pct)}" ${bn(`shareholders[${i}].pct`)} min="0" max="100" placeholder="e.g., 50">
    </div>
  </div>
  ${sh.isEntity === 'yes' ? `
  <div class="field" style="margin-top:14px">
    <label>Trade License of ${esc(sh.name) || 'this entity'} <span class="req">*</span></label>
    ${fileUpload(`entityShTLs[${i}]`, 'Upload Trade License', 'PDF, JPG, or PNG · Max 10 MB', '🏢')}
  </div>` : `
  <div class="field-row">
    <div class="field">
      <label>Nationality <span class="req">*</span></label>
      <select ${bseln(`shareholders[${i}].nationality`)}>${lovOptions('country', sh.nationality, true, 'Select...')}</select>
    </div>
    <div class="field">
      <label>UAE Resident? <span class="req">*</span></label>
      <select ${bseln(`shareholders[${i}].isUaeResident`)}>
        <option value="yes" ${sh.isUaeResident==='yes'?'selected':''}>Yes — has Emirates ID</option>
        <option value="no" ${sh.isUaeResident==='no'?'selected':''}>No — will upload Passport</option>
      </select>
    </div>
  </div>
  <div style="margin-top:6px">
    <label style="font-size:13px;color:var(--text);font-weight:600">${esc(sh.name) || 'Shareholder ' + (i+1)}'s ID <span class="req">*</span></label>
    ${idUploadBlock(sh, `shIdDocs[${i}]`, true)}
  </div>`}
</div>`;
  }

  if (S.shareholderCount === 'more') {
    html += `
<div class="section">
  <h2>Additional Shareholders (5 and beyond)</h2>
  <p class="intro">A brief summary is enough for shareholders below the top four.</p>
  <div class="field">
    <label>Names of additional shareholders</label>
    <textarea ${b('additionalShareholderNames')} placeholder="Comma-separated">${esc(S.additionalShareholderNames)}</textarea>
  </div>
  <div class="field">
    <label>Combined shareholding %</label>
    <input type="number" value="${esc(S.additionalShareholderPct)}" ${b('additionalShareholderPct')} min="0" max="100">
  </div>
</div>`;
  }

  // Signatories
  const shOpts = [];
  for (let i = 0; i < shCount; i++) {
    const sh = S.shareholders[i];
    if (sh.isEntity !== 'yes' && sh.name) shOpts.push({ idx: i, name: sh.name });
  }

  // Section intro — clarifies what "authorised signatory" means before we
  // start asking about each one.
  html += `
<div class="section">
  <h2>Authorised Signatories</h2>
  <p class="intro">An authorised signatory is a person legally empowered to sign contracts and bind this business in agreements with Mawarid Finance. Please list each authorised signatory below.</p>
</div>`;

  let needsPoa = false;
  for (let i = 0; i < sigCount; i++) {
    const sig = S.signatories[i];
    if (sig.mode === 'new') needsPoa = true;

    // Build the dropdown options for THIS signatory by filtering out
    // shareholders already chosen by OTHER signatories. The currently
    // selected one (if any) for this signatory stays visible so the
    // dropdown renders consistently. If a previously selected option
    // disappears (because another signatory grabbed it), the user has
    // to pick fresh — that's fine.
    const takenByOthers = new Set();
    for (let j = 0; j < sigCount; j++) {
      if (j === i) continue;
      const otherSig = S.signatories[j];
      if (otherSig.mode === 'linked' && otherSig.linkedShIdx !== '') {
        takenByOthers.add(String(otherSig.linkedShIdx));
      }
    }
    const availableShOpts = shOpts.filter(o => !takenByOthers.has(String(o.idx)));

    html += `
<div class="section">
  <h2>Authorised Signatory ${i+1}</h2>
  <div class="field">
    <label>Is this authorised signatory one of the shareholders listed above? <span class="req">*</span></label>
    <div class="radio-group">
      <label class="${sel('', sig.mode==='linked')}"><input type="radio" name="sigmode${i}" ${sig.mode==='linked'?'checked':''} ${bradn(`signatories[${i}].mode`,'linked')}> Yes — pick from shareholders</label>
      <label class="${sel('', sig.mode==='new')}"><input type="radio" name="sigmode${i}" ${sig.mode==='new'?'checked':''} ${bradn(`signatories[${i}].mode`,'new')}> No — different person</label>
    </div>
  </div>
  ${sig.mode==='linked' ? `
  <div class="field">
    <label>Which shareholder? <span class="req">*</span></label>
    <select ${bseln(`signatories[${i}].linkedShIdx`)}>
      <option value="">Select...</option>
      ${availableShOpts.map(o => `<option value="${o.idx}" ${sig.linkedShIdx===String(o.idx)?'selected':''}>${esc(o.name)} (Shareholder ${o.idx+1})</option>`).join('')}
    </select>
    ${availableShOpts.length === 0 ? `<div class="help" style="margin-top:6px;color:var(--warn-text)">${shOpts.length === 0 ? 'No individual shareholders with names entered yet. Either go back and complete shareholder names, or pick "different person" above.' : 'All eligible shareholders are already assigned as signatories above. Pick "different person" if this signatory is someone else.'}</div>` : ''}
  </div>` : ''}
  ${sig.mode==='new' ? `
  <div class="field">
    <label>Full Name <span class="req">*</span></label>
    <input type="text" value="${esc(sig.name)}" ${bn(`signatories[${i}].name`)} placeholder="As per Emirates ID or Passport">
  </div>
  <div class="field-row">
    <div class="field">
      <label>Nationality <span class="req">*</span></label>
      <select ${bseln(`signatories[${i}].nationality`)}>${lovOptions('country', sig.nationality, true, 'Select...')}</select>
    </div>
    <div class="field">
      <label>UAE Resident? <span class="req">*</span></label>
      <select ${bseln(`signatories[${i}].isUaeResident`)}>
        <option value="yes" ${sig.isUaeResident==='yes'?'selected':''}>Yes — has Emirates ID</option>
        <option value="no" ${sig.isUaeResident==='no'?'selected':''}>No — will upload Passport</option>
      </select>
    </div>
  </div>
  <div style="margin-top:6px">
    <label style="font-size:13px;color:var(--text);font-weight:600">${esc(sig.name) || 'Signatory ' + (i+1)}'s ID <span class="req">*</span></label>
    ${idUploadBlock(sig, `sigIdDocs[${i}]`, true)}
  </div>` : ''}
</div>`;
  }

  if (needsPoa) {
    html += `
<div class="section">
  <h2>Power of Attorney <span class="req">*</span></h2>
  <p class="intro">A signed POA authorising the non-shareholder signatory(ies) listed above to act on behalf of your business.</p>
  ${fileUpload('poaDoc', 'Upload POA', 'PDF · Max 10 MB', '📄')}
</div>`;
  }

  // UBO acknowledgement.
  // We deliberately do NOT ask the applicant to make a confident claim about
  // who the UBOs are. UBO determination requires understanding ownership
  // chains and "effective control" — concepts applicants often don't know.
  // Compliance handles UBO identification manually during review based on
  // MOA, Share Certificate, and follow-up. The applicant just acknowledges
  // the obligation and commits to providing more info if asked.
  html += `
<div class="section" style="border-color:var(--gold-light);background:var(--beige-light)">
  <h2>Ultimate Beneficial Owner (UBO)</h2>
  <p class="intro">UAE regulations require Mawarid Finance to identify the Ultimate Beneficial Owners (UBOs) of every business we onboard — the natural person(s) who ultimately own or control the business, whether directly, indirectly through layers, or by other means of effective control.</p>
  <div class="field">
    <label style="font-weight:400; display:flex; gap:10px; align-items:flex-start">
      <input type="checkbox" style="margin-top:4px" ${S.uboConfirmed?'checked':''} ${bchk('uboConfirmed')}>
      <span>I understand UBO identification is required and I will provide any additional information and documentation about the business's UBOs that Mawarid Finance requests during compliance review. <span class="req">*</span></span>
    </label>
  </div>
</div>`;

  // Account profile (for multi)
  html += `
<div class="section">
  <h2>Account Profile</h2>
  <div class="field ${emptyRequiredClass(C.estimatedMonthlyTurnover, true)}">
    <label>Estimated Monthly Turnover of the Account <span class="req">*</span></label>
    <select ${bseln('corporate.estimatedMonthlyTurnover')}>${lovOptions('estimated_monthly_turnover', C.estimatedMonthlyTurnover, true, 'Select range...')}</select>
  </div>
  <div class="field ${emptyRequiredClass(C.purposeOfAccount, true)}">
    <label>Purpose of the Account <span class="req">*</span></label>
    ${multiSelectLov('purpose_of_account', 'corporate.purposeOfAccount', 'corporate.purposeOfAccountOther')}
  </div>
  <div class="field ${emptyRequiredClass(C.sourceOfFunds, true)}">
    <label>Source of Funds <span class="req">*</span></label>
    ${multiSelectLov('source_of_funds', 'corporate.sourceOfFunds', 'corporate.sourceOfFundsOther')}
  </div>
</div>`;

  return html;
}

<div class="section">

  }

    html += `

  <h2>MOHRE Employee List${docBadge(true)}</h2>
  <p class="intro">An up-to-date employee list from your MOHRE establishment account — typically downloadable from MOHRE Tasheel or the MOHRE portal.</p>
  ${fileUpload('mohreDoc', 'Upload MOHRE Employee List', 'PDF · Max 10 MB', '👥')}
</div>`;
  }

  // Always-optional additional documents
  html += `
<div class="section">
  <h2>Additional Documents${docBadge(false)}</h2>

  ${fileUpload('additionalDocs', 'Upload additional documents', 'PDF, JPG, or PNG · Max 10 MB', '📎')}
</div>`;

  return html;
}

/* ============================================================
   NAVIGATION & RENDER
   ============================================================ */
function render(preserveScroll) {
  // Update the mobile step indicator. Cheap; runs on every render.
  updateMobileBar();

  const nav = document.getElementById('railNav');
  nav.innerHTML = pages.map(p => {
    const done = isPageStarted(p.id);
    const reachable = p.id <= maxReachedPage;
    const isCurrent = p.id === curPage;
    const cls = isCurrent ? 'active' : !reachable ? 'locked' : '';
    return `<li><button class="${cls}" ${reachable ? `onclick="goTo(${p.id})"` : 'disabled'}>
      <span class="pnum">${String(p.id).padStart(2,'0')}</span><span>${p.title}</span>
      ${done && reachable ? '<span class="page-check">✓</span>' : ''}
    </button></li>`;
  }).join('');

  const scrollY = window.scrollY;
  const page = pages.find(p => p.id === curPage);
  let html = '';

  // Surface a clear banner when LOVs couldn't load — without this, dropdowns
  // appear empty/broken and the customer has no way to know why.
  if (_lovsLoadError && !LOVS) {
    html += `<div class="note-box error" style="margin-bottom:18px">
      <strong>Some form options couldn't be loaded</strong> ${_lovsRetrying ? '— retrying…' : '— please <a href="javascript:location.reload()" style="text-decoration:underline">refresh the page</a>.'}
      Dropdowns may appear empty until this is resolved.
    </div>`;
  }

  html += page.fn();

  // Page 1 has its own "Verify & Continue" button inside the OTP block.
  // Hide the global Next button here to avoid two buttons doing the same thing.
  // For all other pages, show the standard Back / Next / Submit footer.
  if (curPage !== 6 && curPage !== 1) {
    const isFinalStep = curPage === 5;
    html += `<div class="nav-bar">
      <button class="btn btn-back" onclick="goBack()">← Back</button>
      ${isFinalStep
        ? `<button class="btn btn-submit" ${S._submitting?'disabled':''} onclick="goNext()">${S._submitting ? 'Submitting…' : 'Submit Application'}</button>`
        : `<button class="btn btn-next" onclick="goNext()">Next →</button>`
      }
    </div>`;
  } else if (curPage === 1 && !S._otpSent && !S._otpVerified) {
    // Pre-OTP on Page 1: no Back (this is the first page), no Next yet.
    // The "Send verification code" button is inside the OTP block.
  } else if (curPage === 1 && S._otpVerified) {
    // Already verified — let the user move on without re-verifying.
    html += `<div class="nav-bar">
      <button class="btn btn-back" disabled>← Back</button>
      <button class="btn btn-next" onclick="goNext()">Next →</button>
    </div>`;
  }

  if (S._validationMsg) {
    html += `<div class="note-box error" style="margin-top:12px"><strong>Please fix the following:</strong> ${esc(S._validationMsg)}</div>`;
  }

  document.getElementById('main').innerHTML = html;

  document.querySelectorAll('#main input, #main textarea, #main select').forEach(el => {
    el.setAttribute('autocomplete', 'off');
    el.setAttribute('autocorrect', 'off');
    el.setAttribute('autocapitalize', 'off');
    if (!el.name || ['text','email','tel','number'].includes(el.type)) {
      el.setAttribute('name', 'kyb_' + Math.random().toString(36).substr(2, 8));
    }
  });

  // Page 1 OTP button: enabled state depends on the four contact fields,
  // which update S on `oninput` without triggering a re-render (re-rendering
  // on every keystroke would steal focus from the field being typed in).
  // So we attach a separate live updater here that toggles the button only.
  if (curPage === 1 && !S._otpSent) {
    document.querySelectorAll('#main input').forEach(el => {
      el.addEventListener('input', updateOtpSendButtonState);
    });
    updateOtpSendButtonState();
  }

  if (preserveScroll || curPage === _lastPage) {
    window.scrollTo({ top: scrollY, behavior: 'instant' });
  } else {
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
  _lastPage = curPage;

  document.getElementById('rail').classList.remove('open');
  document.getElementById('railOverlay').classList.remove('open');
}

function isPageStarted(id) {
  switch (id) {
    case 1: return !!(S.businessName || S.applicantName || S.email || S.mobile);
    case 2: return !!(S.tlDoc || S.structureType);
    case 3: return S.shareholders.some(s => s.name) || S.signatories.some(s => s.mode) || !!S.externalSignatory.name;
    case 4: return !!(S.vatCertDoc || S.moaDoc || S.aoaDoc);
    case 5: return !!(S.fatcaUSPerson || S.consentGiven);
    case 6: return false;
    default: return false;
  }
}

function goTo(n) {
  if (n > maxReachedPage) return;
  S._validationMsg = ''; S._submitError = '';
  const fromPg = curPage;
  curPage = n;
  if (fromPg !== n) {
    sessionPage(fromPg, n);
    scheduleDraftSave(PAGE_IDS[n]);
  }
  // Close the mobile rail if it's open (user just clicked a nav item)
  const rail = document.getElementById('rail');
  if (rail && rail.classList.contains('open')) {
    rail.classList.remove('open');
    const overlay = document.getElementById('railOverlay');
    if (overlay) overlay.classList.remove('open');
  }
  render();
}

async function goNext() {
  // Page 1 advance is owned by the OTP flow — block the generic path
  // unless OTP is already verified (e.g. user came back from Page 2).
  if (curPage === 1 && !S._otpVerified) {
    S._validationMsg = 'Please verify your email and mobile to continue.';
    render(true);
    return;
  }

  const err = validatePage(curPage);
  if (err) {
    S._validationMsg = err;
    render(true);
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 50);
    return;
  }
  S._validationMsg = '';

  if (curPage === 5) {
    const ok = await submitApplication();
    if (!ok) return;
  }

  if (curPage < totalPages) {
    const fromPg = curPage;
    curPage++;
    if (curPage > maxReachedPage) maxReachedPage = curPage;
    sessionPage(fromPg, curPage);
    scheduleDraftSave(PAGE_IDS[curPage]);
    render();
  }
}

function goBack() {
  S._validationMsg = ''; S._submitError = '';
  if (curPage > 1) {
    const fromPg = curPage;
    curPage--;
    sessionPage(fromPg, curPage);
    scheduleDraftSave(PAGE_IDS[curPage]);
    render();
  }
}

/* ============================================================
   VALIDATION
   ============================================================ */
function validatePage(pg) {
  const sole = isSoleOwnerFlow();
  const multi = isMultiFlow();
  const shCount = effectiveShareholderCount();
  const sigCount = effectiveSignatoryCount();

  switch (pg) {
    case 1:
      if (!S.businessName.trim()) return 'Business name is required.';
      if (!S.applicantName.trim()) return 'Your full name is required.';
      if (!S.email.trim()) return 'Email address is required.';
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(S.email.trim())) return 'Please enter a valid email address.';
      if (!S.mobile.trim()) return 'Mobile number is required.';
      if (!isValidUaeMobile(S.mobile)) return 'Please enter a 9-digit UAE mobile number starting with 5 (e.g. 501234567).';
      return null;

    case 2: {
      if (!S.tlDoc) return 'Please upload your Trade License.';
      // Block if any TL extracted fields haven't been reviewed
      const tlPending = anyUnreviewedFields().filter(p => p.startsWith('tl.'));
      if (tlPending.length > 0) {
        console.warn('[Validate] Unreviewed TL fields:', tlPending);
        // Auto-confirm any pending fields that don't have visible UI on this page
        // (defensive — should never happen with the markExtracted gating, but a
        // safety net so customers don't get stuck).
        const reviewable = ['tl.companyNameEn','tl.licenseNumber','tl.tradeName','tl.issueDate','tl.expiryDate','tl.activitiesText','tl.emirate','tl.legalType'];
        const trulyStuck = tlPending.filter(p => !reviewable.includes(p));
        trulyStuck.forEach(p => { console.warn('[Validate] Auto-confirming invisible field:', p); confirmField(p); });
        const stillPending = tlPending.filter(p => reviewable.includes(p));
        if (stillPending.length > 0) {
          const fieldNames = stillPending.map(p => p.replace('tl.','').replace(/([A-Z])/g, ' $1').toLowerCase().trim()).join(', ');
          return `Please review the ${stillPending.length} extracted Trade License field${stillPending.length>1?'s':''} above (${fieldNames}). Tap "Looks correct" or edit if needed.`;
        }
      }
      // Required TL fields after extraction
      if (!S.tl.companyNameEn.trim()) return 'Company Name (English) is required.';
      if (!S.tl.licenseNumber.trim()) return 'Trade License Number is required.';
      if (!S.tl.expiryDate) return 'Trade License Expiry Date is required.';
      if (isExpiredDate(S.tl.expiryDate)) return 'Your Trade License has expired. Please renew it before continuing — we cannot open an account against an expired Trade License.';
      if (!S.tl.legalType) return 'Please confirm the Legal Type from the dropdown.';
      if (!S.structureType) return 'Please tell us about your business structure.';
      if (sole && !S.ownerIsSignatory) return 'Please indicate whether you are the authorised signatory.';
      if (multi) {
        if (!S.shareholderCount) return 'Please tell us how many shareholders you have.';
        if (!S.hasEntityShareholders) return 'Please tell us whether any shareholders are companies.';
      }
      if (!S.hasEmployees) return 'Please tell us whether any employees are on your MOHRE establishment card.';
      return null;
    }

    case 3: {
      const A = S.authoriser;
      const C = S.corporate;

      // Both modes: must answer the applicant-is-authoriser question
      if (!S.applicantIsAuthoriser) return 'Please indicate whether you are the authoriser for this business.';

      // Sole-owner: applicant=owner check
      if (sole && !S.applicantIsOwner) return 'Please indicate whether you are the owner of this business.';

      if (sole && S.applicantIsOwner) {
        // Block if any authoriser extracted fields haven't been reviewed.
        // Auto-confirm any extracted fields that don't have visible UI on this page
        // so customers don't get stuck on invisible fields.
        const authPending = anyUnreviewedFields().filter(p => p.startsWith('authoriser.'));
        if (authPending.length > 0) {
          console.warn('[Validate] Unreviewed authoriser fields:', authPending);
          const reviewable = [
            'authoriser.firstName','authoriser.middleName','authoriser.lastName',
            'authoriser.fatherName','authoriser.nameArabic',
            'authoriser.dob','authoriser.gender',
            'authoriser.nationality','authoriser.countryOfBirth',
            'authoriser.placeOfBirth','authoriser.countryOfResidence',
            'authoriser.salutation','authoriser.maritalStatus',
            'authoriser.eidNumber','authoriser.eidExpiryDate',
            'authoriser.passportNumber','authoriser.passportExpiryDate',
            'authoriser.passportIssuanceCountry','authoriser.passportIssuanceDate',
          ];
          const trulyStuck = authPending.filter(p => !reviewable.includes(p));
          trulyStuck.forEach(p => { console.warn('[Validate] Auto-confirming invisible field:', p); confirmField(p); });
          const stillPending = authPending.filter(p => reviewable.includes(p));
          if (stillPending.length > 0) {
            const fieldNames = stillPending.map(p => p.replace('authoriser.','').replace(/([A-Z])/g, ' $1').toLowerCase().trim()).join(', ');
            return `Please review the ${stillPending.length} extracted identity field${stillPending.length>1?'s':''} above (${fieldNames}). Tap "Looks correct" or edit if needed.`;
          }
        }

        // Required authoriser fields
        if (!A.firstName.trim()) return 'First name is required.';
        if (!A.lastName.trim())  return 'Last name is required.';
        if (!A.dob)              return 'Date of birth is required.';
        if (!A.gender)           return 'Gender is required.';
        if (!A.nationality)      return 'Nationality is required.';
        if (!A.countryOfResidence) return 'Country of residence is required.';

        // Address
        if (!A.street.trim()) return 'Street / neighborhood is required.';
        if (!A.area.trim())   return 'Area / region is required.';
        if (!A.city.trim())   return 'City is required.';
        if (!A.emirate)       return 'Emirate is required.';

        // Tax
        if (!A.taxYN) return 'Please answer the tax question.';

        // Profession
        if (!A.occupation)  return 'Occupation is required.';
        if (!A.jobTitle.trim()) return 'Job title is required.';
        if (!A.economicSector) return 'Economic sector is required.';
        if (!Array.isArray(A.sourceOfIncome) || A.sourceOfIncome.length === 0)
          return 'Please select at least one Source of Income.';
        if (A.sourceOfIncome.includes('other') && !A.sourceOfIncomeOther.trim())
          return 'Please specify your Source of Income (Other).';

        // PEP
        if (!A.isPep) return 'Please answer the PEP question.';
        if (A.isPep !== 'no') {
          if (!A.pepPositionCountry.trim()) return 'PEP — please describe the position and country.';
          if (!A.pepSourceOfWealthNarrative.trim()) return 'PEP — please describe the source of wealth.';
        }

        // Wealth
        if (!Array.isArray(A.sourceOfWealth) || A.sourceOfWealth.length === 0)
          return 'Please select at least one Source of Wealth.';
        if (A.sourceOfWealth.includes('other') && !A.sourceOfWealthOther.trim())
          return 'Please specify your Source of Wealth (Other).';

        // Sanctions
        if (!A.sanctions) return 'Please answer the sanctions / regulatory question.';
        if (A.sanctions === 'yes' && !A.sanctionsDescription.trim())
          return 'Please briefly describe the sanctions / regulatory issue.';

        // Account profile
        if (!C.estimatedMonthlyTurnover) return 'Estimated Monthly Turnover is required.';
        if (!Array.isArray(C.purposeOfAccount) || C.purposeOfAccount.length === 0)
          return 'Please select at least one Purpose of Account.';

        // ID upload check (sole owner)
        if (!A.eidFrontDoc && !A.passportDoc)
          return 'Please upload either your Emirates ID (front) or your Passport.';

        // ID expiry checks — block if either document is past its expiry date.
        // (Only check if a value was captured/entered; missing dates are caught
        // by their own required-field rules above.)
        if (A.eidExpiryDate && isExpiredDate(A.eidExpiryDate))
          return 'Your Emirates ID has expired. Please renew it before continuing.';
        if (A.passportExpiryDate && isExpiredDate(A.passportExpiryDate))
          return 'Your Passport has expired. Please renew it before continuing.';
      }

      // External signatory (sole owner with different signatory)
      if (sole && S.ownerIsSignatory === 'no') {
        const ext = S.externalSignatory;
        if (!ext.name.trim()) return 'Authorised signatory: full name is required.';
        if (!ext.nationality)  return 'Authorised signatory: nationality is required.';
        const ed = S.externalSignatoryIdDoc;
        const who = ext.name || 'the authorised signatory';
        if (ext.isUaeResident === 'yes') {
          if (!ed.eidFront) return `Please upload the front of ${who}'s Emirates ID.`;
          if (!ed.eidBack)  return `Please upload the back of ${who}'s Emirates ID.`;
        } else {
          if (!ed.passport) return `Please upload ${who}'s passport.`;
        }
        if (!S.poaDoc) return 'Please upload the Power of Attorney for the authorised signatory.';
        if (!ext.isPep) return 'Please answer the PEP question for the authorised signatory.';
      }

      // Multi-flow shareholders + signatories
      if (multi) {
        // Block if authoriser EID extraction unreviewed (multi flow only shows
        // a slim subset of authoriser fields).
        const authPending = anyUnreviewedFields().filter(p => p.startsWith('authoriser.'));
        if (authPending.length > 0) {
          console.warn('[Validate] Unreviewed authoriser fields (multi):', authPending);
          // In the multi-flow About-You section, only firstName/lastName/nationality/dob
          // are surfaced. Auto-confirm anything else extracted from EID/passport.
          const reviewable = ['authoriser.firstName','authoriser.lastName','authoriser.nationality','authoriser.dob'];
          authPending.forEach(p => { if (!reviewable.includes(p)) confirmField(p); });
          const stillPending = authPending.filter(p => reviewable.includes(p));
          if (stillPending.length > 0) {
            const fieldNames = stillPending.map(p => p.replace('authoriser.','').replace(/([A-Z])/g, ' $1').toLowerCase().trim()).join(', ');
            return `Please review the ${stillPending.length} extracted identity field${stillPending.length>1?'s':''} above (${fieldNames}).`;
          }
        }
        if (!A.firstName.trim()) return 'Your first name is required.';
        if (!A.lastName.trim())  return 'Your last name is required.';
        if (!A.nationality)      return 'Your nationality is required.';
        if (!A.dob)              return 'Your date of birth is required.';
        if (!A.isPep)            return 'Please answer the PEP question.';
        // ID expiry checks for the applicant
        if (A.eidExpiryDate && isExpiredDate(A.eidExpiryDate))
          return 'Your Emirates ID has expired. Please renew it before continuing.';
        if (A.passportExpiryDate && isExpiredDate(A.passportExpiryDate))
          return 'Your Passport has expired. Please renew it before continuing.';

        // Shareholder details
        for (let i = 0; i < shCount; i++) {
          const sh = S.shareholders[i];
          if (!sh.name.trim()) return `Shareholder ${i+1}: name is required.`;
          if (!sh.pct) return `Shareholder ${i+1}: shareholding % is required.`;
          if (sh.isEntity !== 'yes') {
            if (!sh.nationality) return `Shareholder ${i+1}: nationality is required.`;
            if (!sh.isUaeResident) return `Shareholder ${i+1}: please indicate UAE residency status.`;
          }
        }
        // Shareholder ID documents
        for (let i = 0; i < shCount; i++) {
          const sh = S.shareholders[i];
          if (!sh.name) continue;
          if (sh.isEntity === 'yes') {
            if (!S.entityShTLs[i]) return `Please upload the Trade License for ${sh.name}.`;
          } else {
            const idDocs = S.shIdDocs[i];
            if (sh.isUaeResident === 'yes') {
              if (!idDocs.eidFront) return `Please upload the front of ${sh.name}'s Emirates ID.`;
              if (!idDocs.eidBack)  return `Please upload the back of ${sh.name}'s Emirates ID.`;
            } else {
              if (!idDocs.passport) return `Please upload ${sh.name}'s passport.`;
            }
          }
        }
        // Signatories
        for (let i = 0; i < sigCount; i++) {
          const sig = S.signatories[i];
          if (!sig.mode) return `Signatory ${i+1}: please indicate whether they are a shareholder or a different person.`;
          if (sig.mode === 'linked' && sig.linkedShIdx === '') return `Signatory ${i+1}: please select which shareholder.`;
          if (sig.mode === 'new') {
            if (!sig.name.trim()) return `Signatory ${i+1}: full name is required.`;
            if (!sig.nationality) return `Signatory ${i+1}: nationality is required.`;
            const idDocs = S.sigIdDocs[i];
            if (sig.isUaeResident === 'yes') {
              if (!idDocs.eidFront) return `Please upload the front of ${sig.name}'s Emirates ID.`;
              if (!idDocs.eidBack)  return `Please upload the back of ${sig.name}'s Emirates ID.`;
            } else {
              if (!idDocs.passport) return `Please upload ${sig.name}'s passport.`;
            }
          }
        }
        if (anySignatoryIsNew() && !S.poaDoc) return 'Please upload the Power of Attorney for non-shareholder signatories.';
        if (!S.uboConfirmed) return 'Please acknowledge the UBO information requirement to proceed.';
        // Account profile
        if (!C.estimatedMonthlyTurnover) return 'Estimated Monthly Turnover is required.';
        if (!Array.isArray(C.purposeOfAccount) || C.purposeOfAccount.length === 0)
          return 'Please select at least one Purpose of Account.';
        if (!Array.isArray(C.sourceOfFunds) || C.sourceOfFunds.length === 0)
          return 'Please select at least one Source of Funds.';
      }
      return null;
    }

    case 4: {
      if (!S.vatCertDoc) return 'Please upload your VAT certificate (or non-registration confirmation).';
      if (!S.tenancyContractDoc) return 'Please upload your Tenancy Contract.';
      // Corporate docs (multi only)
      if (multi) {
        if (!S.moaDoc) return 'Please upload the Memorandum of Association.';
        if (!S.aoaDoc) return 'Please upload the Articles of Association.';
        if (!S.shareCertDoc) return 'Please upload the Share Certificate.';
        if (!S.boardResolutionDoc) return 'Please upload the Board Resolution.';
      }
      if (S.hasEmployees === 'yes' && !S.mohreDoc) return 'Please upload the MOHRE Employee List.';
      return null;
    }

    case 5:
      if (!S.fatcaUSPerson)    return 'Please answer the FATCA U.S. Person question.';
      if (!S.consentGiven)     return 'Please read and accept the consent statement to submit your application.';
      return null;

    default:
      return null;
  }
}

/* ============================================================
   SUBMISSION
   ============================================================ */
async function submitApplication() {
  S._submitting = true; S._submitError = '';
  render(true);

  // Wait briefly for any uploads still in flight. If anything still hasn't
  // finished after 10s we let submit proceed anyway — the applicant can
  // retry by re-uploading the offending file. (We don't block forever
  // because a stuck upload would mean the user is locked out of submitting.)
  const allUploaded = await awaitPendingUploads(10000);
  if (!allUploaded) {
    console.warn('[submit] Some uploads still pending; submitting anyway.');
  }

  try {
    const payload = JSON.parse(JSON.stringify(S, (k, v) => {
      if (k === 'data' || k === 'thumb') return undefined;
      if (k.startsWith('_')) return undefined;
      return v;
    }));
    payload._flow = 'fast_track_v5';
    payload._submittedAt = new Date().toISOString();
    payload.session_id = SESSION_ID;
    // Convert Page-1 mobile from local 9-digit to LSQ wire format.
    // Authoriser/corporate mobiles are free-form (may be international).
    if (S.mobile && isValidUaeMobile(S.mobile)) {
      payload.mobile = fullMobileForWire(S.mobile);
    }

    const resp = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const bodyText = await resp.text();
    let data = null;
    try { data = bodyText ? JSON.parse(bodyText) : null; } catch (_) {}
    if (!resp.ok) {
      const msg = (data && data.detail) ? data.detail : `Server error (${resp.status})`;
      console.error('[/api/submit] failed:', resp.status, bodyText);
      if (data && data.traceback) console.error('traceback:', data.traceback.join('\n'));
      throw new Error(msg);
    }
    _refNum = data.ref;
    S._submitting = false;
    return true;
  } catch (e) {
    if (e.message === 'Failed to fetch' || e.name === 'TypeError') {
      console.log('[Submit] Server unreachable — generating local reference number.');
      _refNum = 'KYB-2026-LOCAL-' + Math.random().toString(36).substr(2, 5).toUpperCase();
      S._submitting = false;
      return true;
    }
    S._submitError = e.message || 'Unknown error';
    S._submitting = false;
    render(true);
    return false;
  }
}

/* ============================================================
   START OVER
   ============================================================ */
function startOver() {
  if (!confirm('This will clear all entered data and start a new application. Continue?')) return;
  startOverInternal();
  // Rotate the session_id so analytics treats this as a fresh funnel.
  try { localStorage.removeItem('kyb_session_id'); } catch (e) {}
  SESSION_ID = null;
  ensureSessionId();
  sessionStart();
  render();
}

/* Reset every field in S to defaults. Used by both the user-facing
   startOver() and the resume "Start over" button (resetSession()).
   Does NOT touch the session_id — callers handle it differently. */
function startOverInternal() {
  // Reset top-level scalars and arrays
  Object.keys(S).forEach(k => {
    if (typeof S[k] === 'string') S[k] = '';
    else if (typeof S[k] === 'boolean') S[k] = false;
    else if (Array.isArray(S[k])) {
      if (k === 'entityShTLs') S[k] = [null,null,null,null];
      else S[k].forEach(obj => {
        if (typeof obj === 'object' && obj !== null) {
          Object.keys(obj).forEach(ok => {
            if (typeof obj[ok] === 'string') obj[ok] = '';
            else if (typeof obj[ok] === 'boolean') obj[ok] = false;
            else if (Array.isArray(obj[ok])) obj[ok].length = 0;
            else obj[ok] = null;
          });
        }
      });
    }
    else if (S[k] === null || typeof S[k] === 'object') {
      if (k === 'externalSignatory') S[k] = { name: '', nationality: '', isUaeResident: 'yes', email: '', mobile: '', dob: '', isPep: '' };
      else if (k === 'externalSignatoryIdDoc') S[k] = { eidFront: null, eidBack: null, passport: null };
      else if (k === '_fieldStatus') S[k] = {};
      else if (k === 'tl') S[k] = { legalType:'', legalTypeRaw:'', licenseNumber:'', companyNameEn:'', companyNameAr:'', tradeName:'', issueDate:'', expiryDate:'', registerNumber:'', issuingAuthority:'', issuingAuthorityCode:'', activitiesText:'', emirate:'' };
      else if (k === 'authoriser') {
        // Re-initialise authoriser to defaults
        S.authoriser = {
          firstName:'', middleName:'', lastName:'', nameArabic:'', fatherName:'',
          dob:'', gender:'', salutation:'',
          nationality:'', citizenship:'', countryOfBirth:'', placeOfBirth:'',
          countryOfResidence:'AE',
          maritalStatus:'', numberOfDependents:'', preferredLanguage:'english',
          idType:'', eidNumber:'', eidIssuanceDate:'', eidExpiryDate:'',
          residenceVisaExpiry:'', passportNumber:'', passportIssuanceDate:'',
          passportIssuanceCountry:'', passportExpiryDate:'',
          eidFrontDoc:null, eidBackDoc:null, passportDoc:null,
          addressType:'residential', buildingName:'', street:'', area:'',
          city:'', emirate:'', poBox:'', addressCountry:'AE',
          residenceType:'', officePhone:'',
          taxYN:'', taxNumber:'',
          occupation:'business_owner', jobTitle:'', activityStatus:'self_employed',
          economicSector:'', sourceOfIncome:[], sourceOfIncomeOther:'',
          incomeCurrency:'AED', monthlySalary:'',
          isPep:'', pepPositionCountry:'', pepSourceOfWealthNarrative:'',
          sourceOfWealth:[], sourceOfWealthOther:'',
          sanctions:'', sanctionsDescription:'',
          isBeneficialOwner:''
        };
      }
      else if (k === 'corporate') {
        S.corporate = {
          sourceOfFunds:[], sourceOfFundsOther:'',
          purposeOfAccount:[], purposeOfAccountOther:'',
          taxIndicator:'', vatTrn:'',
          addressType:'business', buildingName:'', street:'', area:'',
          city:'', emirate:'', poBox:'', addressCountry:'AE',
          sameAsAuthoriser:'no',
          email:'', mobile:'', officePhone:'',
          sameContactAsAuthoriser:'yes', website:'',
          estimatedMonthlyTurnover:'', annualExpectedTurnover:'',
          numberOfEmployees:'0',
          tenancyExpiryDate:''
        };
      }
      else S[k] = null;
    }
  });
  S.signatoryCount = '1';
  S.shareholders.forEach(sh => { sh.isUaeResident = 'yes'; sh.isEntity = 'no'; });
  S.signatories.forEach(sg => { sg.isUaeResident = 'yes'; });
  S.externalSignatory = { name: '', nationality: '', isUaeResident: 'yes', email: '', mobile: '', dob: '', isPep: '' };
  S.externalSignatoryIdDoc = { eidFront: null, eidBack: null, passport: null };
  S._fieldStatus = {};
  _refNum = null;

  // Reset OTP state
  S._otpSent = false;
  S._otpVerified = false;
  S._otpCodeSms = '';
  S._otpError = '';
  S._otpResendCooldown = 0;
  S._refNumber = null;
  if (window._otpCountdownTimer) {
    clearInterval(window._otpCountdownTimer);
    window._otpCountdownTimer = null;
  }

  _maxPageIdReached = 'business_contact';
  curPage = 1;
  maxReachedPage = 1;
}

function toggleRail() {
  document.getElementById('rail').classList.toggle('open');
  document.getElementById('railOverlay').classList.toggle('open');
}

/* Update the mobile bar's step indicator and progress bar.
   Called from render() on every page transition. Cheap DOM manipulation,
   no re-render. */
function updateMobileBar() {
  const stepLabel = document.getElementById('mobStepLabel');
  const stepTitle = document.getElementById('mobStepTitle');
  const progressBar = document.getElementById('mobProgressBar');
  if (!stepLabel || !stepTitle || !progressBar) return;

  // pages is the array of {id, title, fn} defined in render code.
  // Total visible pages (excluding the hidden confirmation if needed).
  const totalSteps = pages.length - 1;   // confirmation page isn't a "step"
  const currentStep = Math.min(curPage, totalSteps);
  const currentPage = pages.find(p => p.id === curPage);
  const title = currentPage ? currentPage.title : '';

  if (curPage >= pages.length) {
    // Confirmation page — special case
    stepLabel.textContent = 'Complete';
    stepTitle.textContent = 'Application submitted';
    progressBar.style.width = '100%';
  } else {
    stepLabel.textContent = `Step ${currentStep} of ${totalSteps}`;
    stepTitle.textContent = title;
    progressBar.style.width = `${(currentStep / totalSteps) * 100}%`;
  }
}

// Bootstrap: register session, load LOVs, check for a resumable draft,
// then render. All independent — render() runs regardless so a backend
// hiccup doesn't block the user.
ensureSessionId();
sessionStart();

// Resume check happens in parallel with LOV load. If there's a draft,
// _resumePrompt will be set and the banner will appear on Page 1.
checkForResumableDraft().catch(e => console.warn('[resume] check failed', e));

loadLovs().finally(() => render());
</script>
